<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>IB Raumkonzept – ERM System</title>
<link id="favicon" rel="icon" href="">
<link id="appleTouchIcon" rel="apple-touch-icon" href="">
<style>
:root{
  --bg:#0d1117; --bg2:#111823; --card:#161d29; --card2:#1c2433; --border:#26303f;
  --text:#e8edf4; --text-dim:#93a1b5; --text-dim2:#5c6a80;
  --primary:#3b82f6; --primary-dim:#1d4ed8; --primary-bg:#132039;
  --green:#22c55e; --green-bg:#0f2618; --red:#ef4444; --red-bg:#2a1416;
  --amber:#f59e0b; --amber-bg:#2a2010; --purple:#a855f7;
  --radius:14px; --radius-sm:9px; --shadow:0 4px 20px rgba(0,0,0,.35);
  --sidebar-w:250px; --ticker-h:44px;
  color-scheme: dark;
}
:root[data-theme="light"]{
  --bg:#f2f4f8; --bg2:#e9ecf3; --card:#ffffff; --card2:#f6f7fb; --border:#dde2ea;
  --text:#111827; --text-dim:#4b5563; --text-dim2:#8a93a3;
  --primary:#2563eb; --primary-dim:#1d4ed8; --primary-bg:#e6efff;
  --green:#16a34a; --green-bg:#e8f8ee; --red:#dc2626; --red-bg:#fdeaea;
  --amber:#d97706; --amber-bg:#fdf3e0; --purple:#9333ea;
  --shadow:0 4px 16px rgba(20,30,60,.08);
  color-scheme: light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; overflow:hidden;
}
button,input,select,textarea{font-family:inherit; font-size:inherit; color:inherit;}
button{cursor:pointer;}
a{color:var(--primary);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}

.hidden{display:none !important;}

/* ---- Login ---- */
#loginScreen{
  position:fixed; inset:0; background:radial-gradient(circle at 30% 20%, var(--bg2), var(--bg));
  display:flex; align-items:center; justify-content:center; z-index:500; flex-direction:column; gap:24px;
}
.loginCard{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:36px 40px; width:min(420px,90vw); text-align:center;
}
.loginLogo{width:88px;height:88px;border-radius:20px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--purple)); font-size:34px; font-weight:700; color:#fff; overflow:hidden;}
.loginLogo img{width:100%;height:100%;object-fit:cover;}
.loginTitle{font-size:20px; font-weight:700; margin-bottom:4px;}
.loginSub{color:var(--text-dim); font-size:13px; margin-bottom:22px;}
.userPickAvatar{width:40px;height:40px;border-radius:50%;background:var(--primary-bg);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto 6px;}

/* ---- App Shell ---- */
#appShell{position:fixed; inset:0; display:flex; flex-direction:column;}
#ticker{
  height:var(--ticker-h); background:var(--card); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0; padding:0 14px; overflow-x:auto; flex-shrink:0; white-space:nowrap;
}
.tickerItem{display:flex; align-items:center; gap:7px; padding:0 16px; border-right:1px solid var(--border); font-size:12.5px; color:var(--text-dim); flex-shrink:0;}
.tickerItem:last-child{border-right:none;}
.tickerItem b{color:var(--text); font-size:13.5px;}
.tickerSpacer{flex:1;}
.tickerBtn{background:none;border:none;font-size:18px;padding:4px 8px;border-radius:8px;color:var(--text-dim);}
.tickerBtn:hover{background:var(--card2); color:var(--text);}

#body{flex:1; display:flex; min-height:0;}
#sidebar{
  width:var(--sidebar-w); background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; padding:14px 10px;
}
.sidebarBrand{display:flex; align-items:center; gap:10px; padding:6px 8px 18px;}
.sidebarLogo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--purple));
  display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;overflow:hidden;flex-shrink:0;}
.sidebarLogo img{width:100%;height:100%;object-fit:cover;}
.sidebarBrandName{font-size:13px; font-weight:700; line-height:1.25;}
.sidebarBrandSub{font-size:10.5px; color:var(--text-dim2);}
.navGroup{margin-bottom:4px;}
.navGroupLabel{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim2); padding:14px 10px 6px;}
.navItem{
  display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:var(--radius-sm);
  color:var(--text-dim); font-size:13.5px; font-weight:500; margin-bottom:2px; border:none; background:none; width:100%; text-align:left;
}
.navItem:hover{background:var(--card2); color:var(--text);}
.navItem.active{background:var(--primary-bg); color:var(--primary); font-weight:700;}
.navIcon{font-size:17px; width:22px; text-align:center; flex-shrink:0;}
.navBadge{margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:700; border-radius:20px; padding:1px 7px;}

#view{flex:1; overflow-y:auto; padding:22px 26px 60px;}

/* ---- Generic Components ---- */
.pageHead{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap;}
.pageTitle{font-size:22px; font-weight:800;}
.pageSub{color:var(--text-dim); font-size:13px; margin-top:2px;}
.btn{
  display:inline-flex; align-items:center; gap:7px; background:var(--card2); border:1px solid var(--border);
  color:var(--text); padding:10px 16px; border-radius:var(--radius-sm); font-weight:600; font-size:13.5px; white-space:nowrap;
}
.btn:hover{border-color:var(--primary);}
.btn.primary{background:var(--primary); border-color:var(--primary); color:#fff;}
.btn.primary:hover{background:var(--primary-dim);}
.btn.danger{background:var(--red-bg); border-color:var(--red); color:var(--red);}
.btn.sm{padding:6px 11px; font-size:12.5px;}
.btn:disabled{opacity:.5; cursor:not-allowed;}
.iconBtn{background:none;border:none;font-size:16px;padding:6px 8px;border-radius:8px;color:var(--text-dim);}
.iconBtn:hover{background:var(--card2); color:var(--text);}

.grid{display:grid; gap:16px;}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-6{grid-template-columns:repeat(6,1fr);}
@media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,1fr);} .grid.cols-6{grid-template-columns:repeat(3,1fr);} .grid.cols-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-6{grid-template-columns:1fr 1fr;}}

.card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow);}
.kpi{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; display:flex; flex-direction:column; gap:6px;}
.kpi .kpiIcon{font-size:20px;}
.kpi .kpiVal{font-size:24px; font-weight:800;}
.kpi .kpiLabel{font-size:12px; color:var(--text-dim);}
.quickTile{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 10px; text-align:center; display:flex; flex-direction:column; gap:8px; align-items:center;}
.quickTile:hover{border-color:var(--primary);}
.quickTile .qIcon{font-size:26px;}
.quickTile .qLabel{font-size:12px; font-weight:600;}

table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; color:var(--text-dim); font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; padding:9px 10px; border-bottom:1px solid var(--border);}
td{padding:11px 10px; border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--card2);}
.tableWrap{overflow-x:auto;}

.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700;}
.badge.green{background:var(--green-bg); color:var(--green);}
.badge.red{background:var(--red-bg); color:var(--red);}
.badge.amber{background:var(--amber-bg); color:var(--amber);}
.badge.blue{background:var(--primary-bg); color:var(--primary);}
.badge.gray{background:var(--card2); color:var(--text-dim);}

.formRow{margin-bottom:14px;}
.formRow label{display:block; font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:6px;}
.formRow input[type=text],.formRow input[type=number],.formRow input[type=date],.formRow input[type=time],
.formRow input[type=email],.formRow input[type=tel],.formRow input[type=password],.formRow input[type=url],
.formRow select,.formRow textarea{
  width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:10px 12px; color:var(--text);
}
.formRow textarea{min-height:80px; resize:vertical;}
.formRow .micWrap{position:relative;}
.formRow .micWrap input,.formRow .micWrap textarea{padding-right:40px;}
.micBtn{position:absolute; right:4px; top:4px; background:none; border:none; font-size:17px; padding:6px 8px; border-radius:8px; color:var(--text-dim);}
.micBtn.listening{color:var(--red); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.modalOverlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:600; padding:20px;}
.modal{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); width:min(640px,100%); max-height:90vh; overflow-y:auto; padding:24px;}
.modal.wide{width:min(920px,100%);}
.modalHead{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
.modalTitle{font-size:17px; font-weight:800;}
.modalFoot{display:flex; justify-content:flex-end; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border);}

.tabs{display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:18px; overflow-x:auto;}
.tabBtn{background:none; border:none; padding:10px 14px; color:var(--text-dim); font-weight:600; font-size:13px; border-bottom:2px solid transparent; white-space:nowrap;}
.tabBtn.active{color:var(--primary); border-bottom-color:var(--primary);}

.empty{text-align:center; padding:40px 20px; color:var(--text-dim);}
.empty .emptyIcon{font-size:36px; margin-bottom:10px;}

.toastWrap{position:fixed; top:16px; right:16px; z-index:900; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--card); border:1px solid var(--border); border-left:4px solid var(--primary); border-radius:10px; padding:12px 16px; box-shadow:var(--shadow); font-size:13px; max-width:340px;}
.toast.error{border-left-color:var(--red);}
.toast.success{border-left-color:var(--green);}
.toast.warn{border-left-color:var(--amber);}
.toastUndo{display:flex; align-items:center; justify-content:space-between; gap:12px;}
.toastUndo button{flex-shrink:0; background:var(--primary); color:#fff; border:none; border-radius:var(--radius-sm); padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer;}

.gsResultItem{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid transparent; background:transparent; cursor:pointer; color:var(--text); font-size:13.5px;}
.gsResultItem:hover{background:var(--card2); border-color:var(--border);}
.gsResultType{font-size:11px; color:var(--text-dim2);}

.progressBar{height:8px; background:var(--bg2); border-radius:20px; overflow:hidden;}
.progressBar > div{height:100%; background:var(--primary); border-radius:20px;}

.chatWrap{display:flex; flex-direction:column; height:520px; background:var(--bg2); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden;}
.chatMsgs{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px;}
.chatMsg{max-width:70%; padding:9px 13px; border-radius:12px; background:var(--card); font-size:13.5px; align-self:flex-start;}
.chatMsg.me{align-self:flex-end; background:var(--primary); color:#fff;}
.chatMsgMeta{font-size:10.5px; color:var(--text-dim2); margin-bottom:3px;}
.chatMsg.me .chatMsgMeta{color:rgba(255,255,255,.75);}
.chatInputBar{display:flex; gap:8px; padding:12px; border-top:1px solid var(--border);}
.chatInputBar input{flex:1;}

.aiBox{background:linear-gradient(135deg, var(--primary-bg), var(--card)); border:1px solid var(--border); border-radius:var(--radius); padding:18px;}
.filterBar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;}
.filterBar input,.filterBar select{background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px;}
.thumbGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px;}
.thumb{position:relative; border-radius:var(--radius-sm); overflow:hidden; aspect-ratio:1; border:1px solid var(--border);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb .thumbDel{position:absolute; top:4px; right:4px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:6px; width:24px; height:24px;}
.thumb .thumbEdit{position:absolute; bottom:4px; left:4px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:6px; padding:3px 8px; font-size:11px; display:flex; align-items:center; gap:3px;}
.thumb .thumbMarkedBadge{position:absolute; top:4px; left:4px; background:var(--primary); color:#fff; font-size:9px; font-weight:700; border-radius:5px; padding:2px 5px;}

@media(max-width:900px){
  :root{--sidebar-w:210px;}
  #view{padding:16px;}
  .grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="loginCard">
    <div class="loginLogo" id="loginLogo">IB</div>
    <div class="loginTitle" id="loginTitle">IB Raumkonzept GmbH</div>
    <div id="loginBody"></div>
  </div>
</div>

<div id="appShell" class="hidden">
  <div id="ticker"></div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="view"></div>
  </div>
</div>

<div class="toastWrap" id="toastWrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<script>
"use strict";

/* =========================================================
   UTILITIES
========================================================= */
function escHtml(v){
  return String(v==null?"":v).replace(/[&<>'"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}
function escAttr(v){
  return String(v==null?"":v).replace(/[&<>'"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function fmtDate(iso){
  if(!iso) return "–";
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function fmtDateTime(iso){
  if(!iso) return "–";
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
}
function fmtCurrency(n){
  n = Number(n)||0;
  return n.toLocaleString("de-DE",{style:"currency",currency:"EUR"});
}
function debounce(fn, ms){
  let t;
  return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args), ms); };
}
function download(content, filename, mime){
  const blob = content instanceof Blob ? content : new Blob([content],{type:mime||"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
}
function toast(msg, type){
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = "toast" + (type?(" "+type):"");
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition="opacity .4s"; el.style.opacity="0"; setTimeout(()=>el.remove(),400); }, type==="error"?6000:3600);
}
function csvEscape(v){
  v = String(v==null?"":v);
  if(/[",;\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}
function toCSV(rows, headers){
  const lines = [headers.map(csvEscape).join(";")];
  for(const r of rows) lines.push(r.map(csvEscape).join(";"));
  return "﻿" + lines.join("\r\n");
}
function compressImage(file, maxSize, quality){
  maxSize = maxSize || 1600; quality = quality || 0.75;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("Datei konnte nicht gelesen werden"));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error("Bild konnte nicht geladen werden"));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxSize || h > maxSize){
          if(w > h){ h = Math.round(h * maxSize / w); w = maxSize; }
          else{ w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("Datei konnte nicht gelesen werden"));
    reader.onload = ()=>resolve(reader.result);
    reader.readAsDataURL(file);
  });
}
function initialsOf(name){
  return String(name||"").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase() || "?";
}
function uniqId(prefix){ return (prefix||"ID") + "-" + Math.random().toString(36).slice(2,8).toUpperCase(); }

/* =========================================================

/** Ensures older/incomplete saved states get any newly-introduced fields without breaking. */
function ensureShape(s){
  const d = defaultState();
  for(const k in d){
    if(s[k] === undefined) s[k] = d[k];
  }
  for(const k in d.firma) if(s.firma[k] === undefined) s.firma[k] = d.firma[k];
  for(const k in d.einstellungen) if(s.einstellungen[k] === undefined) s.einstellungen[k] = d.einstellungen[k];
  if(!s.einstellungen.pflichtdokumenteDefs) s.einstellungen.pflichtdokumenteDefs = d.einstellungen.pflichtdokumenteDefs;
  else for(const k in d.einstellungen.pflichtdokumenteDefs) if(!s.einstellungen.pflichtdokumenteDefs[k]) s.einstellungen.pflichtdokumenteDefs[k] = d.einstellungen.pflichtdokumenteDefs[k];
  s.mitarbeiter.forEach(m=>{
    if(!m.dokumente) m.dokumente=[];
    if(!m.status) m.status="aktiv";
    if(m.urlaubstageJahr==null) m.urlaubstageJahr=30;
    if(m.vorname==null || m.nachname==null){
      const parts = String(m.name||"").trim().split(/\s+/);
      if(m.vorname==null) m.vorname = parts[0]||"";
      if(m.nachname==null) m.nachname = parts.slice(1).join(" ");
    }
    if(m.abteilung==null) m.abteilung = "";
    if(m.brutto==null) m.brutto = 0;
    if(m.vertragstyp==null) m.vertragstyp = "Vollzeit";
    if(!m.rolle) m.rolle = "Mitarbeiter";
    if(m.authUserId===undefined) m.authUserId = null;
  });
  s.kunden.forEach(k=>{
    if(!k.dokumente) k.dokumente=[];
    if(k.notizen==null) k.notizen="";
  });
  s.subunternehmer.forEach(sub=>{
    if(!sub.dokumente) sub.dokumente=[];
    if(sub.notizen==null) sub.notizen="";
  });
  s.projekte.forEach(p=>{
    if(!p.team) p.team=[];
    if(!p.subunternehmer) p.subunternehmer=[];
    if(!p.fotos) p.fotos=[];
    if(!p.dokumente) p.dokumente=[];
    if(!p.material) p.material=[];
    if(!p.bautagebuch) p.bautagebuch=[];
    if(!p.zugaenge) p.zugaenge=[];
    if(!p.checkliste) p.checkliste=[];
    if(!p.aufmasse) p.aufmasse=[];
    if(!p.bauzeitenplan) p.bauzeitenplan=[];
    if(!p.chat) p.chat=[];
    if(!p.status) p.status="In Planung";
    if(p.fortschritt==null) p.fortschritt=0;
  });
  s.fuhrpark.forEach(f=>{
    if(!f.tankkosten) f.tankkosten=[];
    if(!f.schaeden) f.schaeden=[];
  });
  return s;
}

/* =========================================================
   STORAGE LAYER — IndexedDB primary, localStorage fallback/mirror
========================================================= */
const DB_NAME = "erm_ib_raumkonzept";
const DB_STORE = "state";
const DB_VERSION = 1;
const LS_KEY = "erm_ib_state_v1";
const LS_MIGRATED_KEY = "erm_ib_migrated_v1";

let _dbPromise = null;
function openDB(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject)=>{
    if(!window.indexedDB){ reject(new Error("IndexedDB nicht verfügbar")); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error || new Error("IndexedDB konnte nicht geöffnet werden"));
  });
  return _dbPromise;
}
async function idbGet(key){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error || new Error("IndexedDB Lesefehler"));
  });
}
async function idbSet(key, value){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(value, key);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error || new Error("IndexedDB Schreibfehler"));
    tx.onabort = ()=>reject(tx.error || new Error("IndexedDB Schreibvorgang abgebrochen (Speicherplatz voll?)"));
  });
}

    lsOk = true;
  }catch(e){ lsErr = e; }
  saveInFlight = false;

  if(!idbOk && !lsOk){
    const isQuota = (idbErr && idbErr.name==="QuotaExceededError") || (lsErr && lsErr.name==="QuotaExceededError");
    toast(isQuota
      ? "⚠️ Speicher voll! Änderung konnte NICHT gespeichert werden. Bitte Fotos/Dokumente aufräumen oder Backup exportieren."
      : "⚠️ Speichern fehlgeschlagen: " + ((idbErr&&idbErr.message)||(lsErr&&lsErr.message)||"Unbekannter Fehler"),
      "error");
  }else if(!idbOk){
    toast("⚠️ IndexedDB-Speicherung fehlgeschlagen (" + (idbErr&&idbErr.message||"Fehler") + "). Nur Sicherungskopie (localStorage) aktiv.", "warn");
  }

  cloudSyncPush();
  if(saveQueued){ saveQueued=false; persistState(); }
}
const saveState = debounce(persistState, 250);

async function loadState(){
  let idbRaw = null, lsRaw = null;
  try{ idbRaw = await idbGet("main"); }catch(e){ /* IndexedDB unavailable — fall through to localStorage */ }
  try{ lsRaw = localStorage.getItem(LS_KEY); }catch(e){ /* localStorage unavailable */ }

  if(idbRaw){
    try{ S = ensureShape(JSON.parse(idbRaw)); return; }
    catch(e){ toast("Gespeicherte Daten (IndexedDB) waren beschädigt, versuche Sicherungskopie...", "warn"); }
  }
  if(lsRaw){
    try{
      S = ensureShape(JSON.parse(lsRaw));
      toast("Daten aus Sicherungskopie (localStorage) wiederhergestellt.", "warn");
      await idbSet("main", lsRaw).catch(()=>{});
      return;
    }catch(e){ toast("Sicherungskopie war ebenfalls beschädigt — starte mit leerem Datenbestand.", "error"); }
  }

  // one-time migration from legacy localStorage key, if this project ever used a simpler key before
  if(!lsRaw){
    try{
      if(!localStorage.getItem(LS_MIGRATED_KEY)){
        localStorage.setItem(LS_MIGRATED_KEY, "1");
      }
    }catch(e){ /* ignore */ }
  }
  S = ensureShape(defaultState());
}

async function handleLoginSubmit(){
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const msg = document.getElementById("loginMsg");
  if(!email || !password){ msg.style.color = "var(--red)"; msg.textContent = "Bitte E-Mail und Passwort eingeben."; return; }
  const sb = getSupabaseClient();
  if(!sb){ msg.style.color = "var(--red)"; msg.textContent = "Anmeldung derzeit nicht verfügbar."; return; }
  msg.style.color = "var(--text-dim)"; msg.textContent = "Anmeldung läuft…";
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){
      msg.style.color = "var(--red)";
      if(/invalid.*credentials/i.test(error.message||"")) msg.textContent = "E-Mail oder Passwort falsch.";
      else if(!navigator.onLine) msg.textContent = "Keine Internetverbindung. Anmeldung braucht einmalig Netz.";
      else msg.textContent = "Anmeldung fehlgeschlagen: " + error.message;
      return;
    }
    await resolveAndEnter(data.session);
  }catch(e){
    msg.style.color = "var(--red)";
    msg.textContent = navigator.onLine ? ("Anmeldung fehlgeschlagen: "+e.message) : "Keine Internetverbindung. Anmeldung braucht einmalig Netz.";
  }
}
async function resolveAndEnter(session){
  if(!session || !session.user || !session.user.email){ renderLogin(); return; }
  if(LC.cloudSyncEnabled){
    try{ await cloudSyncPull(true); }catch(e){ /* offline-tolerant: weiter mit lokalen Daten */ }

  const email = session.user.email.trim().toLowerCase();
  const m = S.mitarbeiter.find(x=>x.status!=="inaktiv" && (x.email||"").trim().toLowerCase()===email);

/* =========================================================
   BRANDING (logo → favicon / sidebar / login / PWA icon)
========================================================= */
function applyBranding(){
  // Quadratische Slots (Sidebar/Login/Favicon/App-Icon) brauchen ein eigenes
  // quadratisches Icon statt des breiten Briefkopf-Logos, sonst wird ein
  // breites Wortmarken-Logo per object-fit:cover unleserlich zugeschnitten.
  const squareLogo = S.firma.icon || S.firma.logo;
  const name = S.firma.name || "IB Raumkonzept";
  const inits = initialsOf(name);
  const loginLogoEl = document.getElementById("loginLogo");
  loginLogoEl.innerHTML = squareLogo ? `<img src="${escAttr(squareLogo)}" alt="Logo">` : escHtml(inits);
  const sidebarLogoEl = document.getElementById("sidebarLogo");
  if(sidebarLogoEl) sidebarLogoEl.innerHTML = squareLogo ? `<img src="${escAttr(squareLogo)}" alt="Logo">` : escHtml(inits);
  const favicon = document.getElementById("favicon");
  const appleIcon = document.getElementById("appleTouchIcon");
  const iconURL = squareLogo || generateInitialsIconDataURL(inits);
  favicon.href = iconURL;
  appleIcon.href = iconURL;
  buildManifest(iconURL, name);
}
function generateInitialsIconDataURL(inits){
  const canvas = document.createElement("canvas");
  canvas.width = 192; canvas.height = 192;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createLinearGradient(0,0,192,192);
  grad.addColorStop(0,"#3b82f6"); grad.addColorStop(1,"#a855f7");
  ctx.fillStyle = grad; ctx.fillRect(0,0,192,192);
  ctx.fillStyle = "#fff"; ctx.font = "800 78px -apple-system,Arial,sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(inits, 96, 102);
  return canvas.toDataURL("image/png");
}
let _manifestBlobUrl = null;
function buildManifest(iconURL, name){
  const manifest = {
    name: name, short_name: name.length>14 ? "ERM" : name,
    start_url: ".", display: "standalone",
    background_color: "#0d1117", theme_color: "#0d1117",
    icons: [
      {src: iconURL, sizes:"192x192", type:"image/png"},
      {src: iconURL, sizes:"512x512", type:"image/png"}
    ]
  };
  if(_manifestBlobUrl) URL.revokeObjectURL(_manifestBlobUrl);
  const blob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
  _manifestBlobUrl = URL.createObjectURL(blob);
  let link = document.getElementById("manifestLink");
  if(!link){
    link = document.createElement("link");
    link.id = "manifestLink"; link.rel = "manifest";
    document.head.appendChild(link);
  }
  link.href = _manifestBlobUrl;
}

/* =========================================================
   VOICE DICTATION (Web Speech API, German)
========================================================= */
function micButtonHTML(targetId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return "";
  return `<button type="button" class="micBtn" data-mic-for="${escAttr(targetId)}" onclick="toggleDictation(this)" title="Diktieren">🎤</button>`;
}
let _activeRecognition = null;
function toggleDictation(btn){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("Spracherkennung wird von diesem Browser nicht unterstützt.", "warn"); return; }
  const targetId = btn.dataset.micFor;
  const target = document.getElementById(targetId);
  if(!target) return;
  if(_activeRecognition){
    _activeRecognition.stop();
    return;
  }
  const rec = new SR();
  rec.lang = "de-DE";
  rec.interimResults = false;
  rec.continuous = false;
  btn.classList.add("listening");
  _activeRecognition = rec;
  rec.onresult = (ev)=>{
    const text = ev.results[0][0].transcript;
    const sep = target.value && !/[\s]$/.test(target.value) ? " " : "";
    target.value = target.value + sep + text;
    target.dispatchEvent(new Event("input"));
  };
  rec.onerror = ()=>{ toast("Diktat fehlgeschlagen.", "warn"); };
  rec.onend = ()=>{ btn.classList.remove("listening"); _activeRecognition = null; };
  try{ rec.start(); }catch(e){ btn.classList.remove("listening"); _activeRecognition = null; }
}

function toastUndo(msg, undoFn){
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = "toast success toastUndo";
  let done = false;
  const dismiss = ()=>{ el.style.transition="opacity .4s"; el.style.opacity="0"; setTimeout(()=>el.remove(),400); };
  const span = document.createElement("span");
  span.textContent = msg;
  const btn = document.createElement("button");
  btn.type = "button";
  btn.textContent = "Rückgängig";
  btn.onclick = ()=>{
    if(done) return;
    done = true;
    undoFn();
    dismiss();
  };
  el.appendChild(span);
  el.appendChild(btn);
  wrap.appendChild(el);
  setTimeout(()=>{ if(!done){ done = true; dismiss(); } }, 6000);
}

  toastUndo(label, ()=>{

    saveState(); route(location.hash);
  });
}

function sigPadHTML(canvasId, label){
  return `<div class="formRow"><label>${escHtml(label)}</label>
    <canvas id="${escAttr(canvasId)}" width="280" height="120" style="background:#fff; border-radius:8px; width:100%; touch-action:none; border:1px solid var(--border); display:block;"></canvas>
    <button type="button" class="btn sm" style="margin-top:6px;" onclick="clearSigPad('${escAttr(canvasId)}')">Unterschrift löschen</button>
  </div>`;
}
const _sigPadCallbacks = {};
function initSigPad(canvasId, existingDataURL, onChange){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  _sigPadCallbacks[canvasId] = onChange;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(existingDataURL){
    const img = new Image();
    img.onload = ()=>ctx.drawImage(img,0,0,canvas.width,canvas.height);
    img.src = existingDataURL;
  }
  let drawing = false;
  const pos = e=>{
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx*canvas.width/rect.width, y: cy*canvas.height/rect.height };
  };
  const start = e=>{ drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); };
  const move = e=>{ if(!drawing) return; const p = pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle="#111"; ctx.lineWidth=2; ctx.lineCap="round"; ctx.stroke(); e.preventDefault(); };
  const end = ()=>{ if(!drawing) return; drawing = false; const cb = _sigPadCallbacks[canvasId]; if(cb) cb(canvas.toDataURL("image/png")); };
  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start, {passive:false});
  canvas.addEventListener("touchmove", move, {passive:false});
  canvas.addEventListener("touchend", end);
}
function clearSigPad(canvasId){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  const cb = _sigPadCallbacks[canvasId];
  if(cb) cb("");
}

function mitarbeiterName(id){ const m=S.mitarbeiter.find(x=>x.id===id); return m?m.name:"–"; }
function kundeName(id){ const k=S.kunden.find(x=>x.id===id); return k?k.name:"–"; }
function projektName(id){ const p=S.projekte.find(x=>x.id===id); return p?p.name:"–"; }
function rechnungNetto(r){ return (r.positionen||[]).reduce((s,p)=>s+(Number(p.menge)||0)*(Number(p.preis)||0),0); }
function rechnungMwst(r){ return rechnungNetto(r) * 0.19; }
function rechnungSumme(r){ return rechnungNetto(r) + rechnungMwst(r); }
function pushNotification(text, typ){
  S.benachrichtigungen.unshift({id:uid(), text, typ:typ||"info", zeit:new Date().toISOString(), gelesen:false});
  if(S.benachrichtigungen.length>200) S.benachrichtigungen.length=200;
  saveState();
}
function businessDaysBetween(vonISO, bisISO){
  let d0 = new Date(vonISO), d1 = new Date(bisISO);
  if(isNaN(d0)||isNaN(d1)||d1<d0) return 0;
  let n=0;
  for(let d=new Date(d0); d<=d1; d.setDate(d.getDate()+1)){
    const wd = d.getDay();
    if(wd!==0 && wd!==6) n++;
  }
  return n;
}

function pflichtEntityArray(type){
  return type==="mitarbeiter" ? S.mitarbeiter : type==="subunternehmer" ? S.subunternehmer : S.kunden;
}
function pflichtGetEntity(type, id){
  return pflichtEntityArray(type).find(x=>x.id===id);
}
function pflichtLabel(type){
  return {mitarbeiter:"Mitarbeiter", subunternehmer:"Subunternehmer", kunden:"Kunden"}[type] || type;
}
function pflichtDocStatus(doc){
  if(!doc) return "missing";
  if(!doc.gueltigBis) return "ok";
  const days = Math.floor((new Date(doc.gueltigBis) - new Date(todayISO())) / 86400000);
  if(days < 0) return "expired";
  if(days <= 30) return "expiring";
  return "ok";
}

async function uploadPflichtDok(type, id, defName, input){
  const file = input.files[0]; if(!file) return;
  const entity = pflichtGetEntity(type, id);
  try{
    const dataURL = await fileToDataURL(file);
    entity.dokumente.push({id:uid(), name:file.name, dataURL, pflichttyp:defName, gueltigBis:"", datum:new Date().toISOString()});
    saveState(); refreshPflichtView(type, id);
    toast("Dokument hochgeladen.", "success");
  }catch(e){ toast("Datei konnte nicht gelesen werden: "+e.message, "error"); }
}
function removePflichtDok(type, id, docId){
  const entity = pflichtGetEntity(type, id);
  entity.dokumente = entity.dokumente.filter(d=>d.id!==docId);
  saveState(); refreshPflichtView(type, id);
}
function setPflichtDokGueltigkeit(type, id, docId, val){
  const entity = pflichtGetEntity(type, id);
  const doc = entity.dokumente.find(d=>d.id===docId);
  doc.gueltigBis = val;
  saveState(); refreshPflichtView(type, id);
  toast("Gültigkeit gespeichert.", "success");
}
function openPflichtDefsForm(type){
  const defs = (S.einstellungen.pflichtdokumenteDefs && S.einstellungen.pflichtdokumenteDefs[type]) || [];
  openModal(`
    <div class="modalHead"><div class="modalTitle">Pflichtdokumente – ${escHtml(pflichtLabel(type))}</div><button class="iconBtn" onclick="closeModal()">✖</button></div>
    <div class="formRow"><label>Ein Dokumenttyp pro Zeile</label><textarea id="pdDefs" style="min-height:240px;">${escHtml(defs.map(d=>d.name).join("\n"))}</textarea></div>
    <div class="modalFoot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn primary" onclick="savePflichtDefs('${type}')">Speichern</button></div>
  `);
}
function savePflichtDefs(type){
  const names = document.getElementById("pdDefs").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const old = (S.einstellungen.pflichtdokumenteDefs && S.einstellungen.pflichtdokumenteDefs[type]) || [];
  S.einstellungen.pflichtdokumenteDefs[type] = names.map(name=>{
    const existing = old.find(d=>d.name===name);
    return existing || {name, icon:"📄"};
  });
  saveState(); closeModal(); route(location.hash);
  toast("Pflichtdokumente-Liste gespeichert.", "success");
}

async function runDailyOverview(){
  const out = document.getElementById("aiOverviewOut");
  const key = getGeminiKey();
  if(!key){ out.textContent = "Kein Gemini API-Key hinterlegt. Bitte in Einstellungen → KI-Assistent eintragen."; return; }
  out.textContent = "Lädt...";
  try{
    const text = await callGemini(buildDailyOverviewPrompt(), key);
    out.textContent = text;
  }catch(e){
    out.textContent = "Fehler beim Abruf: " + e.message;
  }
}
function buildDailyOverviewPrompt(){
  const heute = todayISO();
  const aktiveProjekte = S.projekte.filter(p=>p.status==="Aktiv").map(p=>`${p.name} (${p.fortschritt||0}%, Deadline ${p.deadline||"–"})`).join("; ");
  const offeneRechnungen = S.rechnungen.filter(r=>r.status!=="bezahlt").length;
  const ueberfaellig = S.rechnungen.filter(r=>r.status!=="bezahlt" && r.faellig && r.faellig<heute).length;
  const offeneAufgaben = S.aufgaben.filter(a=>a.status!=="erledigt").length;
  return `Du bist Assistent eines deutschen Handwerksbetriebs (Trockenbau/Maler/Fliesen/Sanitär). Erstelle einen kurzen, konkreten Tagesüberblick auf Deutsch (max 150 Wörter) mit: 1) Prioritäten heute, 2) Risikocheck, 3) Auslastung. Daten: Aktive Projekte: ${aktiveProjekte||"keine"}. Offene Rechnungen: ${offeneRechnungen}, davon überfällig: ${ueberfaellig}. Offene Aufgaben: ${offeneAufgaben}.`;
}

async function callAccountFunction(body){
  const sb = getSupabaseClient();
  if(!sb) throw new Error("Cloud-Verbindung derzeit nicht verfügbar.");
  const { data } = await sb.auth.getSession();
  const token = data && data.session && data.session.access_token;
  if(!token) throw new Error("Nicht angemeldet.");
  const res = await fetch("/.netlify/functions/manage-employee-account", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer "+token },
    body: JSON.stringify(body)
  });
  const json = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(json.error || ("Fehler ("+res.status+")"));
  return json;
}
async function createEmployeeAccount(mitarbeiterId){
  const m = S.mitarbeiter.find(x=>x.id===mitarbeiterId);
  const password = document.getElementById("acctNewPassword").value;
  if(!password || password.length<6){ toast("Bitte ein Passwort mit mind. 6 Zeichen eingeben.", "warn"); return; }
  try{
    const json = await callAccountFunction({ action:"create", mitarbeiterId, email:m.email, password });
    m.authUserId = json.authUserId;
    saveState();
    renderPersonalakteTab(mitarbeiterId, "stammdaten");
    toast("Konto erstellt.", "success");
  }catch(e){
    toast("Konto konnte nicht erstellt werden: "+e.message, "error");
  }
}
async function resetEmployeePassword(mitarbeiterId){
  const m = S.mitarbeiter.find(x=>x.id===mitarbeiterId);
  const password = document.getElementById("acctResetPassword").value;
  if(!password || password.length<6){ toast("Bitte ein Passwort mit mind. 6 Zeichen eingeben.", "warn"); return; }
  try{
    await callAccountFunction({ action:"reset_password", mitarbeiterId, authUserId:m.authUserId, password });
    toast("Passwort zurückgesetzt.", "success");

}
function exportPersonalakteStammblattPDF(id){
  const m = S.mitarbeiter.find(x=>x.id===id);
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, "Personalstammblatt");
  doc.setFontSize(10.5);
  const rows = [
    ["Name", m.name], ["Position", m.position||"–"], ["Abteilung", m.abteilung||"–"],
    ["E-Mail", m.email||"–"], ["Telefon", m.tel||"–"], ["Adresse", m.adresse||"–"],
    ["Geburtsdatum", m.geburtstag?fmtDate(m.geburtstag):"–"], ["Eintritt", m.eintritt?fmtDate(m.eintritt):"–"],
    ["Vertragstyp", m.vertragstyp||"–"], ["Status", m.status||"–"],
    ["Brutto-Monatsgehalt", fmtCurrency(m.brutto||0)], ["Stundenlohn", fmtCurrency(m.stundenlohn||0)],
    ["Urlaubstage/Jahr", String(m.urlaubstageJahr||30)],
  ];
  rows.forEach(([label,val])=>{
    if(y>270){ doc.addPage(); y=20; }
    doc.setFont(undefined,"bold"); doc.text(label+":", 15, y); doc.setFont(undefined,"normal"); doc.text(String(val), 75, y); y+=8;
  });
  if(m.unterschrift){
    y += 12;
    if(y>230){ doc.addPage(); y=20; }
    try{ doc.addImage(m.unterschrift,"PNG",15,y,60,26); }catch(e){}
    y += 28; doc.line(15,y,80,y); y+=5;
    doc.setFontSize(9); doc.text("Unterschrift Mitarbeiter",15,y);
  }
  pdfFooter(doc);
  doc.save("Personalstammblatt_"+m.name.replace(/[^a-z0-9]+/gi,"_")+".pdf");
  toast("Stammblatt-PDF erstellt.", "success");
}

function saveMitarbeiter(id, isEdit){
  const vorname = document.getElementById("mVorname").value.trim();
  const nachname = document.getElementById("mNachname").value.trim();
  if(!vorname && !nachname){ toast("Bitte Vor- oder Nachname angeben.", "warn"); return; }
  let m = isEdit ? S.mitarbeiter.find(x=>x.id===id) : window._newMitarbeiterDraft;
  m.vorname = vorname; m.nachname = nachname; m.name = (vorname+" "+nachname).trim();
  m.position = document.getElementById("mPosition").value.trim();
  m.abteilung = document.getElementById("mAbteilung").value;
  const rolleField = document.getElementById("mRolle");
  if(rolleField) m.rolle = rolleField.value;
  m.tel = document.getElementById("mTel").value.trim();
  m.email = document.getElementById("mEmail").value.trim();
  m.adresse = document.getElementById("mAdresse").value.trim();
  m.eintritt = document.getElementById("mEintritt").value;
  m.geburtstag = document.getElementById("mGeburtstag").value;
  const bruttoField = document.getElementById("mBrutto");
  if(bruttoField) m.brutto = Number(bruttoField.value)||0;
  m.urlaubstageJahr = Number(document.getElementById("mUrlaub").value)||30;
  const lohnField = document.getElementById("mLohn");
  if(lohnField) m.stundenlohn = Number(lohnField.value)||0;
  m.vertragstyp = document.getElementById("mVertragstyp").value;
  const wasActive = m.status !== "inaktiv";
  m.status = document.getElementById("mStatus").value;
  m.unterschrift = window._mitarbeiterSigDraft || m.unterschrift || "";
  if(!isEdit){ if(!m.dokumente) m.dokumente=[]; S.mitarbeiter.push(m); window._newMitarbeiterDraft=null; }
  saveState();
  closeModal();
  route(location.hash);
  toast("Mitarbeiter gespeichert.", "success");
  if(wasActive && m.status==="inaktiv" && m.authUserId){
    disableEmployeeAccount(m.id).catch(e=>toast("Konto konnte nicht automatisch gesperrt werden: "+e.message, "warn"));
  }
}

  const end = new Date(start); end.setDate(end.getDate()+6);

  view.innerHTML = `

        <button class="btn" onclick="szShiftWeek(-1)">◀ Vorige Woche</button>

        <button class="btn" onclick="exportStundenzettelPDF()">📄 PDF Export</button>
        <button class="btn primary" onclick="exportStundenzettelCSV()">⬇ CSV Export</button>
      </div>
    </div>
    <div class="card"><div class="tableWrap"><table>
      <thead><tr><th>Mitarbeiter</th>${days.map(d=>`<th>${new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"})}</th>`).join("")}<th>Summe</th></tr></thead>
      <tbody>
      ${S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>{
        let wSum=0;
        const cells = days.map(d=>{
          const entries = S.zeiterfassung.filter(z=>z.mitarbeiterId===m.id && z.datum===d && z.kommen && z.gehen);
          const h = entries.reduce((s,e)=>s+hoursBetween(e.kommen,e.gehen),0);
          wSum+=h;
          return `<td>${h?h.toFixed(2)+" h":"–"}</td>`;
        }).join("");
        return `<tr><td><b>${escHtml(m.name)}</b></td>${cells}<td><b>${wSum.toFixed(2)} h</b></td></tr>`;
      }).join("") || `<tr><td colspan="9"><div class="empty">Keine Mitarbeiter</div></td></tr>`}
      </tbody>
    </table></div></div>
  `;
}
function mondayOfWeek(d){
  const date = new Date(d);
  const day = (date.getDay()+6)%7;
  date.setDate(date.getDate()-day);
  return date.toISOString().slice(0,10);
}
function szShiftWeek(dir){
  const d = new Date(window._szWoche);
  d.setDate(d.getDate() + dir*7);
  window._szWoche = d.toISOString().slice(0,10);
  route(location.hash);
}
function hoursBetween(hm1, hm2){
  const [h1,m1] = hm1.split(":").map(Number);
  const [h2,m2] = hm2.split(":").map(Number);
  return Math.max(0, (h2*60+m2 - (h1*60+m1))/60);
}
function exportStundenzettelCSV(){
  const start = new Date(window._szWoche);
  const days = [...Array(7)].map((_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });
  const rows = S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>{
    const perDay = days.map(d=>{
      const entries = S.zeiterfassung.filter(z=>z.mitarbeiterId===m.id && z.datum===d && z.kommen && z.gehen);
      return entries.reduce((s,e)=>s+hoursBetween(e.kommen,e.gehen),0).toFixed(2);
    });
    return [m.name, ...perDay, perDay.reduce((s,h)=>s+Number(h),0).toFixed(2)];
  });
  const csv = toCSV(rows, ["Mitarbeiter", ...days.map(fmtDate), "Summe"]);
  download(csv, "Stundenzettel_"+window._szWoche+".csv", "text/csv;charset=utf-8");
}
function exportStundenzettelPDF(){
  const start = new Date(window._szWoche);
  const end = new Date(start); end.setDate(end.getDate()+6);
  const days = [...Array(7)].map((_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, "Stundenzettel");
  doc.setFontSize(10.5);
  doc.text("Woche: "+fmtDate(start.toISOString())+" – "+fmtDate(end.toISOString()), 15, y);
  y += 10;
  const rows = S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>{
    const perDay = days.map(d=>{
      const entries = S.zeiterfassung.filter(z=>z.mitarbeiterId===m.id && z.datum===d && z.kommen && z.gehen);
      return entries.reduce((s,e)=>s+hoursBetween(e.kommen,e.gehen),0);
    });
    const sum = perDay.reduce((s,h)=>s+h,0);
    return [m.name, ...perDay.map(h=>h?h.toFixed(1)+"h":"–"), sum.toFixed(1)+"h"];
  });
  const headers = ["Mitarbeiter", ...days.map(d=>new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"})), "Summe"];
  const colX = [15, 68, 86, 104, 122, 140, 158, 176, 195];
  y = pdfTable(doc, y, headers, rows, null, colX);
  pdfFooter(doc);
  doc.save("Stundenzettel_"+window._szWoche+".pdf");
  toast("Stundenzettel-PDF erstellt.", "success");

function renderKalender(view){
  if(!window._calMonth) window._calMonth = todayISO().slice(0,7);
  const [year, month] = window._calMonth.split("-").map(Number);
  const firstDay = new Date(year, month-1, 1);
  const startWeekday = (firstDay.getDay()+6)%7;
  const daysInMonth = new Date(year, month, 0).getDate();
  const monthName = firstDay.toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const cells = [];
  for(let i=0;i<startWeekday;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);

  view.innerHTML = `

      <div><div class="pageTitle">Kalender</div><div class="pageSub">${escHtml(monthName)}</div></div>

        <button class="btn" onclick="calShiftMonth(1)">▶</button>
      </div>
    </div>
    <div class="card">
      <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border-radius:10px; overflow:hidden;">
        ${["Mo","Di","Mi","Do","Fr","Sa","So"].map(d=>`<div style="background:var(--card2); padding:8px; text-align:center; font-size:11px; font-weight:700; color:var(--text-dim);">${d}</div>`).join("")}
        ${cells.map(d=>{
          if(!d) return `<div style="background:var(--bg2); min-height:92px;"></div>`;
          const dateStr = `${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const isToday = dateStr===todayISO();
          const urlaube = S.urlaubsantraege.filter(u=>u.von<=dateStr && u.bis>=dateStr && u.status!=="abgelehnt");
          const planungen = S.planung.filter(pl=>pl.datum===dateStr);
          const items = [
            ...urlaube.map(u=>({icon:"🏖️", text:mitarbeiterName(u.mitarbeiterId), bg: u.status==="genehmigt"?"var(--green-bg)":"var(--amber-bg)", fg: u.status==="genehmigt"?"var(--green)":"var(--amber)"})),

function importKundenCSV(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const text = reader.result.replace(/^﻿/,"");
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length){ toast("CSV ist leer.", "warn"); return; }
    const delim = lines[0].includes(";") ? ";" : ",";
    const header = lines[0].split(delim).map(h=>h.trim().toLowerCase());
    let count = 0;
    for(let i=1;i<lines.length;i++){
      const cols = lines[i].split(delim);
      const row = {};
      header.forEach((h,idx)=>row[h]=(cols[idx]||"").trim());
      const name = row.name || row.firma || row.kunde;
      if(!name) continue;
      S.kunden.push({id:uid(), name, ansprechpartner:row.ansprechpartner||row.kontakt||"", tel:row.telefon||row.tel||"", email:row.email||row["e-mail"]||"", adresse:row.adresse||"", notizen:"", dokumente:[]});
      count++;
    }
    saveState(); route(location.hash);
    toast(count + " Kunden importiert.", "success");
  };
  reader.onerror = ()=>toast("CSV konnte nicht gelesen werden.", "error");
  reader.readAsText(file, "utf-8");
}

    try{ doc.addImage(s.unterschrift,"PNG",15,y,60,26); }catch(e){}
    y += 28; doc.line(15,y,80,y); y+=5;
    doc.setFontSize(9); doc.text("Unterschrift Subunternehmer",15,y);
  }
  pdfFooter(doc);
  doc.save("Subunternehmer_"+s.firma.replace(/[^a-z0-9]+/gi,"_")+".pdf");
  toast("Stammdaten-PDF erstellt.", "success");
}
function quickUpdateSubField(id, field, val){
  const s = S.subunternehmer.find(x=>x.id===id);
  s[field] = val;
  saveState();
}
function deleteSub(id){
  confirmDelete("Subunternehmer wirklich löschen?", ()=>{
    const idx = S.subunternehmer.findIndex(x=>x.id===id);
    if(idx===-1) return;
    const removed = S.subunternehmer[idx];
    const affectedProjekte = S.projekte.filter(p=>(p.subunternehmer||[]).includes(id)).map(p=>p.id);
    S.subunternehmer.splice(idx,1);
    S.projekte.forEach(p=>{ p.subunternehmer = (p.subunternehmer||[]).filter(x=>x!==id); });
    saveState(); goTo("#subunternehmer");
    toastUndo("Subunternehmer gelöscht.", ()=>{
      S.subunternehmer.splice(idx,0,removed);
      affectedProjekte.forEach(pid=>{
        const p = S.projekte.find(x=>x.id===pid);
        if(p){ if(!p.subunternehmer) p.subunternehmer=[]; if(!p.subunternehmer.includes(id)) p.subunternehmer.push(id); }
      });
      saveState(); route(location.hash);
    });
  });
}

async function addSubDoc(id, input){

    catch(e){ toast("Datei konnte nicht geladen werden: "+e.message, "error"); }

  saveState(); route(location.hash);
}

function addSubToProjekt(subId, projektId){
  if(!projektId) return;

}
function removeSubFromProjekt(subId, projektId){
  const p = S.projekte.find(x=>x.id===projektId);

}

function renderPlantafel(view){
  if(!window._ptWoche) window._ptWoche = mondayOfWeek(new Date());
  const start = new Date(window._ptWoche);
  const days = [...Array(7)].map((_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });
  view.innerHTML = `
    <div class="pageHead">
      <div><div class="pageTitle">Plantafel</div><div class="pageSub">Personal- &amp; Projekteinsatzplanung</div></div>
      <div style="display:flex; gap:8px;">
        <button class="btn" onclick="ptShiftWeek(-1)">◀</button>
        <button class="btn" onclick="ptShiftWeek(1)">▶</button>
      </div>
    </div>
    <div class="card"><div class="tableWrap"><table>
      <thead><tr><th>Mitarbeiter</th>${days.map(d=>`<th>${new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"})}</th>`).join("")}</tr></thead>
      <tbody>
      ${S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>`
        <tr><td><b>${escHtml(m.name)}</b></td>
        ${days.map(d=>{
          const p = S.planung.find(x=>x.mitarbeiterId===m.id && x.datum===d);
          const proj = p ? S.projekte.find(x=>x.id===p.projektId) : null;
          return `<td style="cursor:pointer; min-width:110px;" onclick="openPlantafelCell('${escAttr(m.id)}','${d}')">${proj?`<span class="badge blue">${escHtml(proj.name)}</span>`:'<span style="color:var(--text-dim2);">–</span>'}</td>`;
        }).join("")}
        </tr>
      `).join("") || `<tr><td colspan="8"><div class="empty">Keine Mitarbeiter</div></td></tr>`}
      </tbody>
    </table></div></div>
  `;
}
function ptShiftWeek(dir){
  const d = new Date(window._ptWoche); d.setDate(d.getDate()+dir*7);
  window._ptWoche = d.toISOString().slice(0,10); route(location.hash);
}
function openPlantafelCell(mid, datum){
  const existing = S.planung.find(x=>x.mitarbeiterId===mid && x.datum===datum);
  openModal(`
    <div class="modalHead"><div class="modalTitle">${escHtml(mitarbeiterName(mid))} – ${fmtDate(datum)}</div><button class="iconBtn" onclick="closeModal()">✖</button></div>
    <div class="formRow"><label>Projekt</label>
      <select id="ptProjekt"><option value="">– keine Zuordnung –</option>${S.projekte.map(p=>`<option value="${escAttr(p.id)}" ${existing&&existing.projektId===p.id?"selected":""}>${escHtml(p.name)}</option>`).join("")}</select>
    </div>
    <div class="modalFoot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn primary" onclick="savePlantafelCell('${escAttr(mid)}','${datum}')">Speichern</button></div>
  `);
}
function savePlantafelCell(mid, datum){
  const projektId = document.getElementById("ptProjekt").value;
  S.planung = S.planung.filter(x=>!(x.mitarbeiterId===mid && x.datum===datum));
  if(projektId) S.planung.push({id:uid(), mitarbeiterId:mid, datum, projektId});
  saveState(); closeModal(); route(location.hash);
}

const BAUPHASE_STATI = ["geplant","läuft","fertig"];
function bauphaseEffectiveStatus(ph){
  if(ph.status==="fertig") return "fertig";
  if(ph.bis && ph.bis < todayISO()) return "verzögert";
  return ph.status || "geplant";
}
function bauphaseStatusColor(status){
  return {geplant:"gray", "läuft":"blue", fertig:"green", "verzögert":"red"}[status] || "gray";
}
function bauphaseBarColor(status){
  return {geplant:"var(--text-dim2)", "läuft":"var(--primary)", fertig:"var(--green)", "verzögert":"var(--red)"}[status] || "var(--text-dim2)";
}
function renderTabBauzeitenplan(body, p){
  const phasen = (p.bauzeitenplan||[]).slice().sort((a,b)=>(a.von||"").localeCompare(b.von||""));
  let ganttHTML = "";
  if(phasen.length){
    const dates = phasen.flatMap(ph=>[ph.von, ph.bis]).filter(Boolean);
    let minD = dates.reduce((a,b)=>a<b?a:b);
    let maxD = dates.reduce((a,b)=>a>b?a:b);
    const minMs = new Date(minD).getTime(), maxMs = new Date(maxD).getTime();
    const totalMs = Math.max(1, maxMs - minMs);
    const heuteMs = new Date(todayISO()).getTime();
    const heutePct = Math.min(100, Math.max(0, (heuteMs-minMs)/totalMs*100));
    const showHeuteLine = heuteMs>=minMs && heuteMs<=maxMs;
    ganttHTML = `
      <div style="margin-bottom:16px;">
        <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:8px;">
          <span>${fmtDate(minD)}</span><span>${fmtDate(maxD)}</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${phasen.map(ph=>{
            const vMs = new Date(ph.von).getTime(), bMs = new Date(ph.bis).getTime();
            const leftPct = (vMs-minMs)/totalMs*100;
            const widthPct = Math.max(1.5, (bMs-vMs)/totalMs*100);
            const status = bauphaseEffectiveStatus(ph);
            const barColor = bauphaseBarColor(status);
            return `
            <div style="display:grid; grid-template-columns:140px 1fr; gap:10px; align-items:center;">
              <div style="font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer;" onclick="openBauphaseForm('${escAttr(p.id)}','${escAttr(ph.id)}')" title="${escAttr(ph.bezeichnung)}">${escHtml(ph.bezeichnung)}</div>
              <div style="position:relative; height:22px; background:var(--bg2); border-radius:6px;">
                ${showHeuteLine?`<div style="position:absolute; left:${heutePct}%; top:-3px; bottom:-3px; width:2px; background:var(--primary);"></div>`:""}
                <div style="position:absolute; left:${leftPct}%; width:${widthPct}%; top:2px; bottom:2px; background:${barColor}; opacity:.85; border-radius:5px; min-width:6px; display:flex; align-items:center; padding:0 6px; overflow:hidden;" onclick="openBauphaseForm('${escAttr(p.id)}','${escAttr(ph.id)}')" title="${escAttr(fmtDate(ph.von))} – ${escAttr(fmtDate(ph.bis))}">
                  <span style="font-size:9.5px; color:#fff; white-space:nowrap;">${ph.fortschritt||0}%</span>
                </div>
              </div>
            </div>`;
          }).join("")}
        </div>
        ${showHeuteLine?`<div class="pageSub" style="margin-top:8px; font-size:11px;">🔵 senkrechte Linie = heute</div>`:""}
      </div>
    `;
  }
  body.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <b>Bauzeitenplan (${phasen.length} Phasen)</b>
        <div style="display:flex; gap:8px;">
          <button class="btn sm" onclick="exportBauzeitenplanPDF('${escAttr(p.id)}')">📄 PDF Export</button>
          <button class="btn primary sm" onclick="openBauphaseForm('${escAttr(p.id)}')">➕ Phase</button>
        </div>
      </div>
      ${ganttHTML}
      <div class="tableWrap"><table>
        <thead><tr><th>Phase</th><th>Von</th><th>Bis</th><th>Status</th><th>Fortschritt</th><th></th></tr></thead>
        <tbody>
        ${phasen.map(ph=>{
          const status = bauphaseEffectiveStatus(ph);
          return `<tr>
            <td>${escHtml(ph.bezeichnung)}</td><td>${fmtDate(ph.von)}</td><td>${fmtDate(ph.bis)}</td>
            <td><span class="badge ${bauphaseStatusColor(status)}">${escHtml(status)}</span></td>
            <td>${ph.fortschritt||0}%</td>
            <td style="text-align:right; white-space:nowrap;">
              <button class="iconBtn" onclick="openBauphaseForm('${escAttr(p.id)}','${escAttr(ph.id)}')">✏️</button>
              <button class="iconBtn" onclick="deleteBauphase('${escAttr(p.id)}','${escAttr(ph.id)}')">🗑️</button>
            </td>
          </tr>`;
        }).join("") || `<tr><td colspan="6"><div class="empty">Noch keine Phasen geplant.</div></td></tr>`}
        </tbody>
      </table></div>
    </div>
  `;
}
function openBauphaseForm(pid, phaseId){
  const p = S.projekte.find(x=>x.id===pid);
  const ph = phaseId ? p.bauzeitenplan.find(x=>x.id===phaseId) : {id:uid(), bezeichnung:"", von:todayISO(), bis:todayISO(), status:"geplant", fortschritt:0};
  openModal(`
    <div class="modalHead"><div class="modalTitle">${phaseId?"Phase bearbeiten":"Phase hinzufügen"}</div><button class="iconBtn" onclick="closeModal()">✖</button></div>
    <div class="formRow"><label>Bezeichnung (Gewerk/Tätigkeit)</label><div class="micWrap"><input id="bpBez" type="text" value="${escAttr(ph.bezeichnung)}">${fieldMic("bpBez")}</div></div>
    <div class="grid cols-2">

      <div class="formRow"><label>Bis</label><input id="bpBis" type="date" value="${escAttr(ph.bis)}"></div>
      <div class="formRow"><label>Status</label><select id="bpStatus">${BAUPHASE_STATI.map(s=>`<option value="${s}" ${ph.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
      <div class="formRow"><label>Fortschritt (%)</label><input id="bpFortschritt" type="number" min="0" max="100" value="${escAttr(ph.fortschritt||0)}"></div>

      <button class="btn" onclick="closeModal()">Abbrechen</button>

function saveBauphase(pid, phaseId, isEdit){
  const bezeichnung = document.getElementById("bpBez").value.trim();
  if(!bezeichnung){ toast("Bezeichnung erforderlich.", "warn"); return; }
  const von = document.getElementById("bpVon").value, bis = document.getElementById("bpBis").value;
  if(von && bis && bis<von){ toast("„Bis“ muss nach „Von“ liegen.", "warn"); return; }
  const p = S.projekte.find(x=>x.id===pid);
  let ph = isEdit ? p.bauzeitenplan.find(x=>x.id===phaseId) : window._newBauphaseDraft;
  ph.bezeichnung = bezeichnung; ph.von = von; ph.bis = bis;
  ph.status = document.getElementById("bpStatus").value;
  ph.fortschritt = Math.max(0, Math.min(100, Number(document.getElementById("bpFortschritt").value)||0));
  if(!isEdit){ p.bauzeitenplan.push(ph); window._newBauphaseDraft=null; }
  saveState(); closeModal(); route(location.hash);
  toast("Phase gespeichert.", "success");
}
function deleteBauphase(pid, phaseId){
  const p = S.projekte.find(x=>x.id===pid);
  deleteItemWithUndo(p.bauzeitenplan, phaseId, "Phase gelöscht.");
}

  const p = S.projekte.find(x=>x.id===pid);
  if(!p.bauzeitenplan.length){ toast("Keine Phasen zum Exportieren.", "warn"); return; }
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, "Bauzeitenplan");
  doc.setFontSize(10.5);
  doc.text("Projekt: "+p.name, 15, y); y+=6;
  doc.text("Adresse: "+(p.adresse||"–"), 15, y); y+=10;
  const rows = p.bauzeitenplan.slice().sort((a,b)=>(a.von||"").localeCompare(b.von||"")).map(ph=>[

const FOTO_MARK_FARBEN = ["#ef4444","#f59e0b","#22c55e","#3b82f6","#ffffff","#111111"];
function openFotoMarkierung(pid, fotoId){
  const p = S.projekte.find(x=>x.id===pid);
  const foto = p.fotos.find(f=>f.id===fotoId);
  if(!foto) return;
  window._fotoMarkDraft = {pid, fotoId, color:FOTO_MARK_FARBEN[0], strokes:[], baseImg:null};
  openModal(`
    <div class="modalHead"><div class="modalTitle">✏️ Foto markieren</div><button class="iconBtn" onclick="closeModal()">✖</button></div>
    <div style="display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; align-items:center;">
      <span style="font-size:12px; color:var(--text-dim);">Farbe:</span>
      ${FOTO_MARK_FARBEN.map(c=>`<button type="button" onclick="setFotoMarkColor('${c}')" data-color-swatch="${c}" style="width:30px;height:30px;border-radius:50%;background:${c};border:3px solid ${c===FOTO_MARK_FARBEN[0]?"var(--primary)":"var(--border)"};padding:0;"></button>`).join("")}
      <button class="btn sm" onclick="undoFotoMark()">↩ Rückgängig</button>
      <button class="btn sm" onclick="resetFotoMark()">🔄 Zurücksetzen</button>
    </div>
    <div style="background:#111; border-radius:10px; overflow:hidden; display:flex; justify-content:center;">
      <canvas id="fotoMarkCanvas" style="max-width:100%; max-height:60vh; touch-action:none; display:block;"></canvas>
    </div>
    <div class="pageSub" style="margin-top:8px;">Mit dem Finger oder der Maus direkt auf das Foto zeichnen (z.B. Mängel einkreisen).</div>
    <div class="modalFoot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn primary" onclick="saveFotoMarkierung()">Speichern</button></div>
  `, true);
  initFotoMarkCanvas(foto.dataURL);
}
function initFotoMarkCanvas(dataURL){
  const canvas = document.getElementById("fotoMarkCanvas");
  const img = new Image();
  img.onload = ()=>{
    const maxW = 1000, maxH = 700;
    const scale = Math.min(1, maxW/img.width, maxH/img.height);
    canvas.width = Math.round(img.width*scale);
    canvas.height = Math.round(img.height*scale);
    window._fotoMarkDraft.baseImg = img;
    redrawFotoMark();
    let drawing = false, current = null;
    const pos = e=>{
      const rect = canvas.getBoundingClientRect();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      return { x: cx*canvas.width/rect.width, y: cy*canvas.height/rect.height };
    };
    const start = e=>{ drawing = true; current = {color:window._fotoMarkDraft.color, points:[pos(e)]}; e.preventDefault(); };
    const move = e=>{
      if(!drawing) return;
      current.points.push(pos(e));
      redrawFotoMark(); drawFotoStroke(canvas.getContext("2d"), current);
      e.preventDefault();
    };
    const end = ()=>{
      if(!drawing) return;
      drawing = false;
      if(current && current.points.length>1) window._fotoMarkDraft.strokes.push(current);
      current = null;
    };
    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    canvas.addEventListener("touchstart", start, {passive:false});
    canvas.addEventListener("touchmove", move, {passive:false});
    canvas.addEventListener("touchend", end);
  };
  img.src = dataURL;
}
function drawFotoStroke(ctx, stroke){
  if(stroke.points.length<2) return;
  ctx.strokeStyle = stroke.color; ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
  for(let i=1;i<stroke.points.length;i++) ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
  ctx.stroke();
}
function redrawFotoMark(){
  const canvas = document.getElementById("fotoMarkCanvas");
  if(!canvas || !window._fotoMarkDraft.baseImg) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(window._fotoMarkDraft.baseImg, 0, 0, canvas.width, canvas.height);
  window._fotoMarkDraft.strokes.forEach(s=>drawFotoStroke(ctx, s));
}
function setFotoMarkColor(c){
  window._fotoMarkDraft.color = c;
  document.querySelectorAll("[data-color-swatch]").forEach(b=>{
    b.style.borderColor = b.dataset.colorSwatch===c ? "var(--primary)" : "var(--border)";
  });
}
function undoFotoMark(){
  window._fotoMarkDraft.strokes.pop();
  redrawFotoMark();
}
function resetFotoMark(){
  window._fotoMarkDraft.strokes = [];
  redrawFotoMark();
}
function saveFotoMarkierung(){
  const { pid, fotoId, strokes } = window._fotoMarkDraft;
  if(!strokes.length){ toast("Keine Markierung gezeichnet.", "warn"); return; }
  const canvas = document.getElementById("fotoMarkCanvas");
  const dataURL = canvas.toDataURL("image/jpeg", 0.85);
  const p = S.projekte.find(x=>x.id===pid);

}

/* ---- Aufmaß (manuelle Raumvermessung, Shoelace-Formel) ---- */
function calcRaum(raum){
  let heading = 0, x=0, y=0;
  const pts = [[0,0]];
  for(const seg of raum.segmente){
    const rad = heading * Math.PI/180;
    x += (Number(seg.laenge)||0) * Math.cos(rad);
    y += (Number(seg.laenge)||0) * Math.sin(rad);
    pts.push([x,y]);
    const aussenwinkel = 180 - (Number(seg.winkel)||90);
    heading += (seg.drehrichtung==="CCW" ? aussenwinkel : -aussenwinkel);
  }
  const umfangSegmente = raum.segmente.reduce((s,seg)=>s+(Number(seg.laenge)||0),0);
  const first = pts[0], last = pts[pts.length-1];
  const schliessDist = Math.hypot(last[0]-first[0], last[1]-first[1]);
  const geschlossen = schliessDist < 0.05;
  let flaeche = 0;
  for(let i=0;i<pts.length;i++){
    const [x1,y1] = pts[i], [x2,y2] = pts[(i+1)%pts.length];
    flaeche += (x1*y2 - x2*y1);
  }
  flaeche = Math.abs(flaeche)/2;
  const umfang = umfangSegmente + (geschlossen?0:schliessDist);
  const wandflaeche = Math.max(0, umfang*(Number(raum.hoehe)||0) - (Number(raum.abzuege)||0));
  return {pts, flaeche, umfang, wandflaeche, geschlossen};
}

  const c = calcRaum(window._raumDraft);
  const xs = c.pts.map(p=>p[0]), ys = c.pts.map(p=>p[1]);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const w = Math.max(0.5, maxX-minX), h = Math.max(0.5, maxY-minY);
  const pad = Math.max(w,h)*0.15 + 0.2;
  const vbW = w+pad*2, vbH = h+pad*2;
  const svgPts = c.pts.map(p=>`${(p[0]-minX+pad).toFixed(2)},${(p[1]-minY+pad).toFixed(2)}`).join(" ");
  document.getElementById("rSvgPreview").innerHTML = `
    <svg width="220" height="220" viewBox="0 0 ${vbW.toFixed(2)} ${vbH.toFixed(2)}" style="background:var(--card); border-radius:10px; border:1px solid var(--border);">
      <polygon points="${svgPts}" fill="rgba(59,130,246,.25)" stroke="var(--primary)" stroke-width="${(vbW/80).toFixed(3)}"/>
    </svg>`;
  document.getElementById("rCalcOut").innerHTML = `
    Grundfläche: <b>${c.flaeche.toFixed(2)} m²</b><br>
    Umfang: <b>${c.umfang.toFixed(2)} m</b><br>
    Wandfläche: <b>${c.wandflaeche.toFixed(2)} m²</b><br>
    ${!c.geschlossen?'<span class="badge amber">⚠ Raum nicht geschlossen – letztes Segment prüfen</span>':'<span class="badge green">✓ Raum geschlossen</span>'}
  `;
}
function saveRaum(){
  const p = S.projekte.find(x=>x.id===window._raumPid);
  const r = window._raumDraft;
  if(!r.name.trim()){ toast("Raumname erforderlich.", "warn"); return; }
  if(window._raumIsEdit){
    const idx = p.aufmasse.findIndex(x=>x.id===window._raumOrigId);
    p.aufmasse[idx] = r;
  }else{
    p.aufmasse.push(r);
  }

  toast("Raum gespeichert.", "success");
}
function deleteRaum(pid, rid){
  confirmDelete("Raum wirklich löschen?", ()=>{
    const p = S.projekte.find(x=>x.id===pid);

function exportAufmassPDF(pid){
  const p = S.projekte.find(x=>x.id===pid);
  if(!p.aufmasse.length){ toast("Keine Räume zum Exportieren.", "warn"); return; }
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, "Aufmaß-Protokoll");
  doc.setFontSize(11);
  doc.text("Projekt: " + p.name, 15, y); y+=6;
  doc.text("Adresse: " + (p.adresse||"–"), 15, y); y+=10;
  let gesamtFlaeche=0, gesamtWand=0;
  p.aufmasse.forEach(r=>{
    const c = calcRaum(r);
    gesamtFlaeche += c.flaeche; gesamtWand += c.wandflaeche;
    if(y>250){ doc.addPage(); y=20; }
    doc.setFont(undefined,"bold"); doc.text(r.name, 15, y); doc.setFont(undefined,"normal");
    y+=6;
    doc.setFontSize(10);
    doc.text(`Höhe: ${r.hoehe} m   Grundfläche: ${c.flaeche.toFixed(2)} m²   Umfang: ${c.umfang.toFixed(2)} m   Wandfläche: ${c.wandflaeche.toFixed(2)} m²`, 15, y);
    y+=8; doc.setFontSize(11);
  });
  if(y>250){ doc.addPage(); y=20; }
  doc.setFont(undefined,"bold");
  doc.text(`Gesamt Grundfläche: ${gesamtFlaeche.toFixed(2)} m²   Gesamt Wandfläche: ${gesamtWand.toFixed(2)} m²`, 15, y);
  doc.setFont(undefined,"normal");
  y += 20;
  if(p.aufmassUnterschrift){
    if(y>240){ doc.addPage(); y=20; }
    try{ doc.addImage(p.aufmassUnterschrift,"PNG",15,y,60,26); }catch(e){}
    y += 28;
    doc.line(15,y,80,y); y+=5;
    doc.setFontSize(9);
    doc.text("Unterschrift (Bestätigung Aufmaß)",15,y);
  }
  pdfFooter(doc);
  doc.save("Aufmass_"+p.name.replace(/[^a-z0-9]+/gi,"_")+".pdf");
}

/* =========================================================
   SHARED PDF BRIEFKOPF/FOOTER (DIN 5008)
========================================================= */
function pdfNewDoc(){
  if(!window.jspdf || !window.jspdf.jsPDF){ throw new Error("PDF-Bibliothek lädt noch. Bitte kurz warten und erneut versuchen."); }
  return new window.jspdf.jsPDF();
}
function pdfHeader(doc, title){
  const f = S.firma;
  let y = 15;
  if(f.logo){
    // Seitenverhältnis beachten statt fest zu quetschen (das breite Wortmarken-Logo
    // war vorher auf ein 26x26-Quadrat gezwungen und dadurch stark verzerrt).
    const aspect = f.logoAspect || 1;
    const logoW = 46, logoH = logoW / aspect;
    try{ doc.addImage(f.logo, "JPEG", 15, y, logoW, logoH, undefined, "FAST"); }
    catch(e){ try{ doc.addImage(f.logo, "PNG", 15, y, logoW, logoH, undefined, "FAST"); }catch(e2){ /* logo not embeddable, skip silently in PDF only */ } }
  }
  doc.setFontSize(9); doc.setTextColor(90);
  // Firmenname bewusst nicht nochmal als Text - steht bereits im Logo.
  [f.strasse, [f.plz,f.ort].filter(Boolean).join(" "), f.tel, f.email].filter(Boolean).forEach((l,i)=>{
    doc.text(String(l), 195, y+4+i*4, {align:"right"});
  });
  doc.setTextColor(0);
  y += 32;
  doc.setDrawColor(210); doc.line(15,y,195,y);
  y += 10;
  doc.setFontSize(16); doc.setFont(undefined,"bold");
  doc.text(title, 15, y);
  doc.setFont(undefined,"normal"); doc.setFontSize(10.5);
  return y + 10;
}
function pdfFooter(doc){
  const f = S.firma;
  const pages = doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    const h = doc.internal.pageSize.getHeight();
    doc.setDrawColor(210); doc.line(15,h-24,195,h-24);
    doc.setFontSize(7.5); doc.setTextColor(110);
    const col1 = [f.name, f.geschaeftsfuehrer?("GF: "+f.geschaeftsfuehrer):"", [f.amtsgericht,f.hrb].filter(Boolean).join(" ")].filter(Boolean);
    const col2 = [f.bank, f.iban, f.bic].filter(Boolean);
    const col3 = [f.steuernr?("St-Nr: "+f.steuernr):"", f.ustid?("USt-ID: "+f.ustid):"", f.tel, f.email].filter(Boolean);
    col1.forEach((l,idx)=>doc.text(String(l),15,h-19+idx*3.4));
    col2.forEach((l,idx)=>doc.text(String(l),80,h-19+idx*3.4));
    col3.forEach((l,idx)=>doc.text(String(l),145,h-19+idx*3.4));
    doc.setTextColor(0); doc.setFontSize(8);
    doc.text("Seite "+i+" / "+pages, 195, h-6, {align:"right"});
  }
}
function pdfTable(doc, y, headers, rows, colWidths, colX){
  doc.setFontSize(9); doc.setFont(undefined,"bold");
  headers.forEach((h,i)=>doc.text(h, colX[i], y));
  doc.setFont(undefined,"normal");
  doc.setDrawColor(210); doc.line(15,y+2,195,y+2);
  y += 7;
  rows.forEach(row=>{
    if(y>270){ doc.addPage(); y=20; }
    row.forEach((cell,i)=>doc.text(String(cell), colX[i], y, i===row.length-1?{align:"right"}:{}));
    y += 6;
  });
  return y;
}

function saveRechnung(){
  const r = window._rechnungDraft;
  if(!r.kundeId){ toast("Bitte Kunde wählen.", "warn"); return; }
  if(window._rechnungIsEdit){
    const idx = S.rechnungen.findIndex(x=>x.id===r.id);
    S.rechnungen[idx] = r;
  }else{
    S.rechnungen.push(r);
    S.einstellungen.rechnungNrCounter++;
  }
  saveState(); closeModal(); route(location.hash);
  toast("Rechnung gespeichert.", "success");
}
function markRechnungBezahlt(id){
  S.rechnungen.find(r=>r.id===id).status="bezahlt";
  saveState(); route(location.hash);
}
function deleteRechnung(id){
  confirmDelete("Rechnung wirklich löschen?", ()=>{
    deleteItemWithUndo(S.rechnungen, id, "Rechnung gelöscht.");
  });
}
function exportRechnungPDF(id){
  const r = S.rechnungen.find(x=>x.id===id);
  const k = S.kunden.find(x=>x.id===r.kundeId);
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, "Rechnung "+r.nr);
  doc.setFontSize(10);
  if(k){ [k.name, k.adresse].filter(Boolean).forEach((l,i)=>doc.text(String(l),15,y+i*5)); y+=14; }
  doc.text("Rechnungsdatum: "+fmtDate(r.datum), 140, y-14);
  doc.text("Fällig: "+fmtDate(r.faellig), 140, y-9);
  y += 8;
  y = pdfTable(doc, y, ["Beschreibung","Menge","Einheit","Preis","Summe"], r.positionen.map(p=>[p.beschreibung, p.menge, p.einheit, fmtCurrency(p.preis), fmtCurrency(p.menge*p.preis)]), null, [15,110,130,150,195]);
  y += 6;
  doc.setDrawColor(210); doc.line(120,y,195,y); y+=6;
  doc.text("Netto:", 150, y); doc.text(fmtCurrency(rechnungNetto(r)), 195, y, {align:"right"}); y+=6;
  doc.text("MwSt 19%:", 150, y); doc.text(fmtCurrency(rechnungMwst(r)), 195, y, {align:"right"}); y+=6;
  doc.setFont(undefined,"bold");
  doc.text("Gesamt:", 150, y); doc.text(fmtCurrency(rechnungSumme(r)), 195, y, {align:"right"});
  doc.setFont(undefined,"normal");
  if(r.notiz){ y+=12; doc.setFontSize(9); doc.text(doc.splitTextToSize(r.notiz,180), 15, y); y+=10; }
  if(r.unterschrift){
    y += 14;
    if(y>230){ doc.addPage(); y=20; }
    try{ doc.addImage(r.unterschrift,"PNG",15,y,60,26); }catch(e){}
    y += 28; doc.line(15,y,80,y); y+=5;
    doc.setFontSize(9); doc.text("Unterschrift",15,y);
  }
  pdfFooter(doc);
  doc.save(r.nr+".pdf");
}
function exportDatevCSV(){
  const rows = S.rechnungen.map(r=>[r.nr, fmtDate(r.datum), kundeName(r.kundeId), rechnungNetto(r).toFixed(2), rechnungMwst(r).toFixed(2), rechnungSumme(r).toFixed(2), rechnungEffectiveStatus(r)]);
  const csv = toCSV(rows, ["Belegnummer","Datum","Kunde","Netto","MwSt","Brutto","Status"]);
  download(csv, "DATEV_Rechnungen_"+todayISO()+".csv", "text/csv;charset=utf-8");
}

function vertragMitarbeiterChange(mid){
  window._vertragDraft.mitarbeiterId = mid;
  document.getElementById("vInhalt").value = defaultVertragText(S.mitarbeiter.find(m=>m.id===mid));
  window._vertragDraft.inhalt = document.getElementById("vInhalt").value;
}
function setupSigCanvas(canvasId, existingDataURL){
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(existingDataURL){ const img = new Image(); img.onload=()=>ctx.drawImage(img,0,0,canvas.width,canvas.height); img.src=existingDataURL; }
  let drawing=false;
  const pos = e=>{ const rect=canvas.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top; return {x:cx*canvas.width/rect.width, y:cy*canvas.height/rect.height}; };
  const start = e=>{ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); };
  const move = e=>{ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle="#111"; ctx.lineWidth=2; ctx.lineCap="round"; ctx.stroke(); e.preventDefault(); };
  const end = ()=>{ drawing=false; window._vertragDraft["unterschrift"+(canvasId==="sigAG"?"AG":"AN")] = canvas.toDataURL("image/png"); };
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move); window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start); canvas.addEventListener("touchmove", move); canvas.addEventListener("touchend", end);
}
function clearSig(canvasId){
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  window._vertragDraft["unterschrift"+(canvasId==="sigAG"?"AG":"AN")] = "";
}
function saveVertrag(isEditStr){
  const isEdit = isEditStr==="true";
  const v = window._vertragDraft;
  if(!v.mitarbeiterId){ toast("Bitte Mitarbeiter wählen.", "warn"); return; }
  v.status = (v.unterschriftAG && v.unterschriftAN) ? "unterschrieben" : "entwurf";
  if(isEdit){ const idx=S.vertraege.findIndex(x=>x.id===v.id); S.vertraege[idx]=v; }
  else S.vertraege.push(v);
  saveState(); closeModal(); route(location.hash);
  toast("Vertrag gespeichert.", "success");
}
function deleteVertrag(id){
  confirmDelete("Vertrag wirklich löschen?", ()=>{
    deleteItemWithUndo(S.vertraege, id, "Vertrag gelöscht.");
  });
}
function exportVertragPDF(id){
  const v = S.vertraege.find(x=>x.id===id);
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, v.typ);
  doc.setFontSize(10);
  const lines = doc.splitTextToSize(v.inhalt, 180);

      ${fd.typ==="checkbox" ? `
        <label style="display:flex; align-items:center; gap:10px; background:var(--card2); padding:12px 14px; border-radius:10px; margin-bottom:10px; cursor:pointer;">
          <input type="checkbox" style="width:20px; height:20px;" onchange="window._vorlageDraft.werte['${escAttr(fd.label)}']=this.checked?'Ja':'Nein'">
