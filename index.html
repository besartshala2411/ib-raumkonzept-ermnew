<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>IB Raumkonzept – ERM System</title>
<link id="favicon" rel="icon" href="">
<link id="appleTouchIcon" rel="apple-touch-icon" href="">
<style>
:root{
  --bg:#0d1117; --bg2:#111823; --card:#161d29; --card2:#1c2433; --border:#26303f;
  --text:#e8edf4; --text-dim:#93a1b5; --text-dim2:#5c6a80;
  --primary:#3b82f6; --primary-dim:#1d4ed8; --primary-bg:#132039;
  --green:#22c55e; --green-bg:#0f2618; --red:#ef4444; --red-bg:#2a1416;
  --amber:#f59e0b; --amber-bg:#2a2010; --purple:#a855f7;
  --radius:14px; --radius-sm:9px; --shadow:0 4px 20px rgba(0,0,0,.35);
  --sidebar-w:250px; --ticker-h:44px;
  color-scheme: dark;
}
:root[data-theme="light"]{
  --bg:#f2f4f8; --bg2:#e9ecf3; --card:#ffffff; --card2:#f6f7fb; --border:#dde2ea;
  --text:#111827; --text-dim:#4b5563; --text-dim2:#8a93a3;
  --primary:#2563eb; --primary-dim:#1d4ed8; --primary-bg:#e6efff;
  --green:#16a34a; --green-bg:#e8f8ee; --red:#dc2626; --red-bg:#fdeaea;
  --amber:#d97706; --amber-bg:#fdf3e0; --purple:#9333ea;
  --shadow:0 4px 16px rgba(20,30,60,.08);
  color-scheme: light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; overflow:hidden;
}
button,input,select,textarea{font-family:inherit; font-size:inherit; color:inherit;}
button{cursor:pointer;}
a{color:var(--primary);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}

.hidden{display:none !important;}

/* ---- Login ---- */
#loginScreen{
  position:fixed; inset:0; background:radial-gradient(circle at 30% 20%, var(--bg2), var(--bg));
  display:flex; align-items:center; justify-content:center; z-index:500; flex-direction:column; gap:24px;
}
.loginCard{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:36px 40px; width:min(420px,90vw); text-align:center;
}
.loginLogo{width:88px;height:88px;border-radius:20px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--purple)); font-size:34px; font-weight:700; color:#fff; overflow:hidden;}
.loginLogo img{width:100%;height:100%;object-fit:cover;}
.loginTitle{font-size:20px; font-weight:700; margin-bottom:4px;}
.loginSub{color:var(--text-dim); font-size:13px; margin-bottom:22px;}
.userPickGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-bottom:16px; max-height:280px; overflow-y:auto;}
.userPickBtn{background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 8px; text-align:center;}
.userPickBtn:hover{border-color:var(--primary);}
.userPickAvatar{width:40px;height:40px;border-radius:50%;background:var(--primary-bg);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto 6px;}
.userPickName{font-size:12.5px; font-weight:600;}

/* ---- App Shell ---- */
#appShell{position:fixed; inset:0; display:flex; flex-direction:column;}
#ticker{
  height:var(--ticker-h); background:var(--card); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0; padding:0 14px; overflow-x:auto; flex-shrink:0; white-space:nowrap;
}
.tickerItem{display:flex; align-items:center; gap:7px; padding:0 16px; border-right:1px solid var(--border); font-size:12.5px; color:var(--text-dim); flex-shrink:0;}
.tickerItem:last-child{border-right:none;}
.tickerItem b{color:var(--text); font-size:13.5px;}
.tickerSpacer{flex:1;}
.tickerBtn{background:none;border:none;font-size:18px;padding:4px 8px;border-radius:8px;color:var(--text-dim);}
.tickerBtn:hover{background:var(--card2); color:var(--text);}

#body{flex:1; display:flex; min-height:0;}
#sidebar{
  width:var(--sidebar-w); background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; padding:14px 10px;
}
.sidebarBrand{display:flex; align-items:center; gap:10px; padding:6px 8px 18px;}
.sidebarLogo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--purple));
  display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;overflow:hidden;flex-shrink:0;}
.sidebarLogo img{width:100%;height:100%;object-fit:cover;}
.sidebarBrandName{font-size:13px; font-weight:700; line-height:1.25;}
.sidebarBrandSub{font-size:10.5px; color:var(--text-dim2);}
.navGroup{margin-bottom:4px;}
.navGroupLabel{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim2); padding:14px 10px 6px;}
.navItem{
  display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:var(--radius-sm);
  color:var(--text-dim); font-size:13.5px; font-weight:500; margin-bottom:2px; border:none; background:none; width:100%; text-align:left;
}
.navItem:hover{background:var(--card2); color:var(--text);}
.navItem.active{background:var(--primary-bg); color:var(--primary); font-weight:700;}
.navIcon{font-size:17px; width:22px; text-align:center; flex-shrink:0;}
.navBadge{margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:700; border-radius:20px; padding:1px 7px;}

#view{flex:1; overflow-y:auto; padding:22px 26px 60px;}

/* ---- Generic Components ---- */
.pageHead{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap;}
.pageTitle{font-size:22px; font-weight:800;}
.pageSub{color:var(--text-dim); font-size:13px; margin-top:2px;}
.btn{
  display:inline-flex; align-items:center; gap:7px; background:var(--card2); border:1px solid var(--border);
  color:var(--text); padding:10px 16px; border-radius:var(--radius-sm); font-weight:600; font-size:13.5px; white-space:nowrap;
}
.btn:hover{border-color:var(--primary);}
.btn.primary{background:var(--primary); border-color:var(--primary); color:#fff;}
.btn.primary:hover{background:var(--primary-dim);}
.btn.danger{background:var(--red-bg); border-color:var(--red); color:var(--red);}
.btn.sm{padding:6px 11px; font-size:12.5px;}
.btn:disabled{opacity:.5; cursor:not-allowed;}
.iconBtn{background:none;border:none;font-size:16px;padding:6px 8px;border-radius:8px;color:var(--text-dim);}
.iconBtn:hover{background:var(--card2); color:var(--text);}

.grid{display:grid; gap:16px;}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-6{grid-template-columns:repeat(6,1fr);}
@media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,1fr);} .grid.cols-6{grid-template-columns:repeat(3,1fr);} .grid.cols-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-6{grid-template-columns:1fr 1fr;}}

.card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow);}
.kpi{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; display:flex; flex-direction:column; gap:6px;}
.kpi .kpiIcon{font-size:20px;}
.kpi .kpiVal{font-size:24px; font-weight:800;}
.kpi .kpiLabel{font-size:12px; color:var(--text-dim);}
.quickTile{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 10px; text-align:center; display:flex; flex-direction:column; gap:8px; align-items:center;}
.quickTile:hover{border-color:var(--primary);}
.quickTile .qIcon{font-size:26px;}
.quickTile .qLabel{font-size:12px; font-weight:600;}

table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; color:var(--text-dim); font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; padding:9px 10px; border-bottom:1px solid var(--border);}
td{padding:11px 10px; border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--card2);}
.tableWrap{overflow-x:auto;}

.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700;}
.badge.green{background:var(--green-bg); color:var(--green);}
.badge.red{background:var(--red-bg); color:var(--red);}
.badge.amber{background:var(--amber-bg); color:var(--amber);}
.badge.blue{background:var(--primary-bg); color:var(--primary);}
.badge.gray{background:var(--card2); color:var(--text-dim);}

.formRow{margin-bottom:14px;}
.formRow label{display:block; font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:6px;}
.formRow input[type=text],.formRow input[type=number],.formRow input[type=date],.formRow input[type=time],
.formRow input[type=email],.formRow input[type=tel],.formRow input[type=password],.formRow input[type=url],
.formRow select,.formRow textarea{
  width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:10px 12px; color:var(--text);
}
.formRow textarea{min-height:80px; resize:vertical;}
.formRow .micWrap{position:relative;}
.formRow .micWrap input,.formRow .micWrap textarea{padding-right:40px;}
.micBtn{position:absolute; right:4px; top:4px; background:none; border:none; font-size:17px; padding:6px 8px; border-radius:8px; color:var(--text-dim);}
.micBtn.listening{color:var(--red); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.modalOverlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:600; padding:20px;}
.modal{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); width:min(640px,100%); max-height:90vh; overflow-y:auto; padding:24px;}
.modal.wide{width:min(920px,100%);}
.modalHead{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
.modalTitle{font-size:17px; font-weight:800;}
.modalFoot{display:flex; justify-content:flex-end; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border);}

.tabs{display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:18px; overflow-x:auto;}
.tabBtn{background:none; border:none; padding:10px 14px; color:var(--text-dim); font-weight:600; font-size:13px; border-bottom:2px solid transparent; white-space:nowrap;}
.tabBtn.active{color:var(--primary); border-bottom-color:var(--primary);}

.empty{text-align:center; padding:40px 20px; color:var(--text-dim);}
.empty .emptyIcon{font-size:36px; margin-bottom:10px;}

.toastWrap{position:fixed; top:16px; right:16px; z-index:900; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--card); border:1px solid var(--border); border-left:4px solid var(--primary); border-radius:10px; padding:12px 16px; box-shadow:var(--shadow); font-size:13px; max-width:340px;}
.toast.error{border-left-color:var(--red);}
.toast.success{border-left-color:var(--green);}
.toast.warn{border-left-color:var(--amber);}

.progressBar{height:8px; background:var(--bg2); border-radius:20px; overflow:hidden;}
.progressBar > div{height:100%; background:var(--primary); border-radius:20px;}

.chatWrap{display:flex; flex-direction:column; height:520px; background:var(--bg2); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden;}
.chatMsgs{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px;}
.chatMsg{max-width:70%; padding:9px 13px; border-radius:12px; background:var(--card); font-size:13.5px; align-self:flex-start;}
.chatMsg.me{align-self:flex-end; background:var(--primary); color:#fff;}
.chatMsgMeta{font-size:10.5px; color:var(--text-dim2); margin-bottom:3px;}
.chatMsg.me .chatMsgMeta{color:rgba(255,255,255,.75);}
.chatInputBar{display:flex; gap:8px; padding:12px; border-top:1px solid var(--border);}
.chatInputBar input{flex:1;}

.aiBox{background:linear-gradient(135deg, var(--primary-bg), var(--card)); border:1px solid var(--border); border-radius:var(--radius); padding:18px;}
.filterBar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;}
.filterBar input,.filterBar select{background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px;}
.thumbGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px;}
.thumb{position:relative; border-radius:var(--radius-sm); overflow:hidden; aspect-ratio:1; border:1px solid var(--border);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb .thumbDel{position:absolute; top:4px; right:4px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:6px; width:24px; height:24px;}

@media(max-width:900px){
  :root{--sidebar-w:210px;}
  #view{padding:16px;}
  .grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,1fr);}
}
</style>

  <div class="loginCard">

  <div id="ticker"></div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="view"></div>
  </div>
</div>

<div class="toastWrap" id="toastWrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<script>
"use strict";

/* =========================================================
   UTILITIES
========================================================= */
function escHtml(v){
  return String(v==null?"":v).replace(/[&<>'"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}
function escAttr(v){
  return String(v==null?"":v).replace(/[&<>'"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function fmtDate(iso){
  if(!iso) return "–";
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function fmtDateTime(iso){
  if(!iso) return "–";
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
}
function fmtCurrency(n){
  n = Number(n)||0;
  return n.toLocaleString("de-DE",{style:"currency",currency:"EUR"});
}
function debounce(fn, ms){
  let t;
  return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args), ms); };
}
function download(content, filename, mime){
  const blob = content instanceof Blob ? content : new Blob([content],{type:mime||"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
}
function toast(msg, type){
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = "toast" + (type?(" "+type):"");
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition="opacity .4s"; el.style.opacity="0"; setTimeout(()=>el.remove(),400); }, type==="error"?6000:3600);
}
function csvEscape(v){
  v = String(v==null?"":v);
  if(/[",;\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}
function toCSV(rows, headers){
  const lines = [headers.map(csvEscape).join(";")];
  for(const r of rows) lines.push(r.map(csvEscape).join(";"));
  return "﻿" + lines.join("\r\n");
}
function compressImage(file, maxSize, quality){
  maxSize = maxSize || 1600; quality = quality || 0.75;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("Datei konnte nicht gelesen werden"));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error("Bild konnte nicht geladen werden"));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxSize || h > maxSize){
          if(w > h){ h = Math.round(h * maxSize / w); w = maxSize; }
          else{ w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("Datei konnte nicht gelesen werden"));
    reader.onload = ()=>resolve(reader.result);
    reader.readAsDataURL(file);
  });
}
function initialsOf(name){
  return String(name||"").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase() || "?";
}
function uniqId(prefix){ return (prefix||"ID") + "-" + Math.random().toString(36).slice(2,8).toUpperCase(); }

/* =========================================================
   STATE MODEL
========================================================= */
function defaultState(){
  return {
    _v: 1,
    firma: {
      name:"IB Raumkonzept GmbH", strasse:"", plz:"", ort:"", tel:"", email:"", web:"",
      iban:"", bic:"", bank:"", steuernr:"", ustid:"", geschaeftsfuehrer:"", amtsgericht:"", hrb:"",
      logo:""
    },
    mitarbeiter: [],
    zeiterfassung: [],
    urlaubsantraege: [],
    onboarding: [],
    onboardingVorlagen: [],
    kunden: [],
    subunternehmer: [],
    tagesaufgaben: [],
    planung: [],
    projekte: [],
    aufgaben: [],
    baustellenchat: [],
    dokumente: [],
    rechnungen: [],
    vertraege: [],
    schluessel: [],
    vorlagen: [],
    passwoerter: [],
    fuhrpark: [],
    benachrichtigungen: [],
    einstellungen: {
      rechnungNrCounter: 1,
    },
    currentUserId: null,
  };
}
var S = defaultState();

/** Per-device local-only config: never synced to cloud (secrets, connection settings, device prefs). */
const LC_KEY = "erm_local_config_v1";
function defaultLC(){
  return {
    theme:"dark",
    cloudSyncEnabled:false, supabaseUrl:"", supabaseAnonKey:"", freigabeCode:"",
    pushEnabled:false, vapidPublicKey:"",
    geminiApiKey:"",
  };
}
var LC = defaultLC();
function loadLC(){
  try{
    const raw = localStorage.getItem(LC_KEY);
    if(raw) LC = Object.assign(defaultLC(), JSON.parse(raw));
  }catch(e){ toast("Lokale Einstellungen konnten nicht geladen werden.", "warn"); }
}
function saveLC(){
  try{
    localStorage.setItem(LC_KEY, JSON.stringify(LC));
  }catch(e){
    toast("⚠️ Lokale Einstellungen (Cloud-Sync/KI-Key) konnten nicht gespeichert werden: "+e.message, "error");
  }
}
function getGeminiKey(){ return LC.geminiApiKey || ""; }
function setGeminiKey(key){ LC.geminiApiKey = key; saveLC(); }

/** Ensures older/incomplete saved states get any newly-introduced fields without breaking. */
function ensureShape(s){
  const d = defaultState();
  for(const k in d){
    if(s[k] === undefined) s[k] = d[k];
  }
  for(const k in d.firma) if(s.firma[k] === undefined) s.firma[k] = d.firma[k];
  for(const k in d.einstellungen) if(s.einstellungen[k] === undefined) s.einstellungen[k] = d.einstellungen[k];
  s.mitarbeiter.forEach(m=>{
    if(!m.dokumente) m.dokumente=[];
    if(!m.status) m.status="aktiv";
    if(m.urlaubstageJahr==null) m.urlaubstageJahr=30;
  });
  s.projekte.forEach(p=>{
    if(!p.team) p.team=[];
    if(!p.fotos) p.fotos=[];
    if(!p.dokumente) p.dokumente=[];
    if(!p.material) p.material=[];
    if(!p.bautagebuch) p.bautagebuch=[];
    if(!p.zugaenge) p.zugaenge=[];
    if(!p.checkliste) p.checkliste=[];
    if(!p.aufmasse) p.aufmasse=[];
    if(!p.chat) p.chat=[];
    if(!p.status) p.status="In Planung";
    if(p.fortschritt==null) p.fortschritt=0;
  });
  s.fuhrpark.forEach(f=>{
    if(!f.tankkosten) f.tankkosten=[];
    if(!f.schaeden) f.schaeden=[];
  });
  return s;
}

/* =========================================================
   STORAGE LAYER — IndexedDB primary, localStorage fallback/mirror
========================================================= */
const DB_NAME = "erm_ib_raumkonzept";
const DB_STORE = "state";
const DB_VERSION = 1;
const LS_KEY = "erm_ib_state_v1";
const LS_MIGRATED_KEY = "erm_ib_migrated_v1";

let _dbPromise = null;
function openDB(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject)=>{
    if(!window.indexedDB){ reject(new Error("IndexedDB nicht verfügbar")); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error || new Error("IndexedDB konnte nicht geöffnet werden"));
  });
  return _dbPromise;
}
async function idbGet(key){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error || new Error("IndexedDB Lesefehler"));
  });
}
async function idbSet(key, value){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(value, key);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error || new Error("IndexedDB Schreibfehler"));
    tx.onabort = ()=>reject(tx.error || new Error("IndexedDB Schreibvorgang abgebrochen (Speicherplatz voll?)"));
  });
}

let saveInFlight = false;
let saveQueued = false;
async function persistState(){
  if(saveInFlight){ saveQueued = true; return; }
  saveInFlight = true;
  const payload = JSON.stringify(S);
  let idbOk = false, lsOk = false, idbErr = null, lsErr = null;
  try{
    await idbSet("main", payload);
    idbOk = true;
  }catch(e){ idbErr = e; }
  try{
    localStorage.setItem(LS_KEY, payload);
    lsOk = true;
  }catch(e){ lsErr = e; }
  saveInFlight = false;

  if(!idbOk && !lsOk){
    const isQuota = (idbErr && idbErr.name==="QuotaExceededError") || (lsErr && lsErr.name==="QuotaExceededError");
    toast(isQuota
      ? "⚠️ Speicher voll! Änderung konnte NICHT gespeichert werden. Bitte Fotos/Dokumente aufräumen oder Backup exportieren."
      : "⚠️ Speichern fehlgeschlagen: " + ((idbErr&&idbErr.message)||(lsErr&&lsErr.message)||"Unbekannter Fehler"),
      "error");
  }else if(!idbOk){
    toast("⚠️ IndexedDB-Speicherung fehlgeschlagen (" + (idbErr&&idbErr.message||"Fehler") + "). Nur Sicherungskopie (localStorage) aktiv.", "warn");
  }

  cloudSyncPush();
  if(saveQueued){ saveQueued=false; persistState(); }
}
const saveState = debounce(persistState, 250);

async function loadState(){
  let idbRaw = null, lsRaw = null;
  try{ idbRaw = await idbGet("main"); }catch(e){ /* IndexedDB unavailable — fall through to localStorage */ }
  try{ lsRaw = localStorage.getItem(LS_KEY); }catch(e){ /* localStorage unavailable */ }

  if(idbRaw){
    try{ S = ensureShape(JSON.parse(idbRaw)); return; }
    catch(e){ toast("Gespeicherte Daten (IndexedDB) waren beschädigt, versuche Sicherungskopie...", "warn"); }
  }
  if(lsRaw){
    try{
      S = ensureShape(JSON.parse(lsRaw));
      toast("Daten aus Sicherungskopie (localStorage) wiederhergestellt.", "warn");
      await idbSet("main", lsRaw).catch(()=>{});
      return;
    }catch(e){ toast("Sicherungskopie war ebenfalls beschädigt — starte mit leerem Datenbestand.", "error"); }
  }

  // one-time migration from legacy localStorage key, if this project ever used a simpler key before
  if(!lsRaw){
    try{
      if(!localStorage.getItem(LS_MIGRATED_KEY)){
        localStorage.setItem(LS_MIGRATED_KEY, "1");
      }
    }catch(e){ /* ignore */ }
  }
  S = ensureShape(defaultState());
}

function generateInitialsIconDataURL(inits){
  const canvas = document.createElement("canvas");
  canvas.width = 192; canvas.height = 192;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createLinearGradient(0,0,192,192);
  grad.addColorStop(0,"#3b82f6"); grad.addColorStop(1,"#a855f7");
  ctx.fillStyle = grad; ctx.fillRect(0,0,192,192);
  ctx.fillStyle = "#fff"; ctx.font = "800 78px -apple-system,Arial,sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(inits, 96, 102);
  return canvas.toDataURL("image/png");
}
let _manifestBlobUrl = null;
function buildManifest(iconURL, name){
  const manifest = {
    name: name, short_name: name.length>14 ? "ERM" : name,
    start_url: ".", display: "standalone",
    background_color: "#0d1117", theme_color: "#0d1117",
    icons: [
      {src: iconURL, sizes:"192x192", type:"image/png"},
      {src: iconURL, sizes:"512x512", type:"image/png"}
    ]
  };
  if(_manifestBlobUrl) URL.revokeObjectURL(_manifestBlobUrl);
  const blob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
  _manifestBlobUrl = URL.createObjectURL(blob);
  let link = document.getElementById("manifestLink");
  if(!link){
    link = document.createElement("link");
    link.id = "manifestLink"; link.rel = "manifest";
    document.head.appendChild(link);
  }
  link.href = _manifestBlobUrl;
}

/* =========================================================
   VOICE DICTATION (Web Speech API, German)
========================================================= */
function micButtonHTML(targetId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return "";
  return `<button type="button" class="micBtn" data-mic-for="${escAttr(targetId)}" onclick="toggleDictation(this)" title="Diktieren">🎤</button>`;
}
let _activeRecognition = null;
function toggleDictation(btn){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("Spracherkennung wird von diesem Browser nicht unterstützt.", "warn"); return; }
  const targetId = btn.dataset.micFor;
  const target = document.getElementById(targetId);
  if(!target) return;
  if(_activeRecognition){
    _activeRecognition.stop();
    return;
  }
  const rec = new SR();
  rec.lang = "de-DE";
  rec.interimResults = false;
  rec.continuous = false;
  btn.classList.add("listening");
  _activeRecognition = rec;
  rec.onresult = (ev)=>{
    const text = ev.results[0][0].transcript;
    const sep = target.value && !/[\s]$/.test(target.value) ? " " : "";
    target.value = target.value + sep + text;
    target.dispatchEvent(new Event("input"));
  };
  rec.onerror = ()=>{ toast("Diktat fehlgeschlagen.", "warn"); };
  rec.onend = ()=>{ btn.classList.remove("listening"); _activeRecognition = null; };
  try{ rec.start(); }catch(e){ btn.classList.remove("listening"); _activeRecognition = null; }
}

function businessDaysBetween(vonISO, bisISO){
  let d0 = new Date(vonISO), d1 = new Date(bisISO);
  if(isNaN(d0)||isNaN(d1)||d1<d0) return 0;
  let n=0;
  for(let d=new Date(d0); d<=d1; d.setDate(d.getDate()+1)){
    const wd = d.getDay();
    if(wd!==0 && wd!==6) n++;
  }
  return n;
}

function buildDailyOverviewPrompt(){
  const heute = todayISO();
  const aktiveProjekte = S.projekte.filter(p=>p.status==="Aktiv").map(p=>`${p.name} (${p.fortschritt||0}%, Deadline ${p.deadline||"–"})`).join("; ");

========================================================= */
function renderStundenzettel(view){
  if(!window._szWoche) window._szWoche = mondayOfWeek(new Date());
  const start = new Date(window._szWoche);
  const end = new Date(start); end.setDate(end.getDate()+6);
  const days = [...Array(7)].map((_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });

  view.innerHTML = `
    <div class="pageHead">
      <div><div class="pageTitle">Stundenzettel</div><div class="pageSub">${fmtDate(start.toISOString())} – ${fmtDate(end.toISOString())}</div></div>
      <div style="display:flex; gap:8px;">
        <button class="btn" onclick="szShiftWeek(-1)">◀ Vorige Woche</button>
        <button class="btn" onclick="szShiftWeek(1)">Nächste Woche ▶</button>
        <button class="btn primary" onclick="exportStundenzettelCSV()">⬇ CSV Export</button>
      </div>
    </div>
    <div class="card"><div class="tableWrap"><table>
      <thead><tr><th>Mitarbeiter</th>${days.map(d=>`<th>${new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"})}</th>`).join("")}<th>Summe</th></tr></thead>
      <tbody>
      ${S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>{
        let wSum=0;
        const cells = days.map(d=>{
          const entries = S.zeiterfassung.filter(z=>z.mitarbeiterId===m.id && z.datum===d && z.kommen && z.gehen);
          const h = entries.reduce((s,e)=>s+hoursBetween(e.kommen,e.gehen),0);
          wSum+=h;
          return `<td>${h?h.toFixed(2)+" h":"–"}</td>`;
        }).join("");
        return `<tr><td><b>${escHtml(m.name)}</b></td>${cells}<td><b>${wSum.toFixed(2)} h</b></td></tr>`;
      }).join("") || `<tr><td colspan="9"><div class="empty">Keine Mitarbeiter</div></td></tr>`}
      </tbody>
    </table></div></div>
  `;
}
function mondayOfWeek(d){
  const date = new Date(d);
  const day = (date.getDay()+6)%7;
  date.setDate(date.getDate()-day);
  return date.toISOString().slice(0,10);
}
function szShiftWeek(dir){
  const d = new Date(window._szWoche);
  d.setDate(d.getDate() + dir*7);
  window._szWoche = d.toISOString().slice(0,10);
  route(location.hash);
}
function hoursBetween(hm1, hm2){
  const [h1,m1] = hm1.split(":").map(Number);
  const [h2,m2] = hm2.split(":").map(Number);
  return Math.max(0, (h2*60+m2 - (h1*60+m1))/60);
}
function exportStundenzettelCSV(){
  const start = new Date(window._szWoche);
  const days = [...Array(7)].map((_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });
  const rows = S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>{
    const perDay = days.map(d=>{
      const entries = S.zeiterfassung.filter(z=>z.mitarbeiterId===m.id && z.datum===d && z.kommen && z.gehen);
      return entries.reduce((s,e)=>s+hoursBetween(e.kommen,e.gehen),0).toFixed(2);
    });
    return [m.name, ...perDay, perDay.reduce((s,h)=>s+Number(h),0).toFixed(2)];
  });
  const csv = toCSV(rows, ["Mitarbeiter", ...days.map(fmtDate), "Summe"]);
  download(csv, "Stundenzettel_"+window._szWoche+".csv", "text/csv;charset=utf-8");
}

  k.tel=document.getElementById("kTel").value.trim(); k.email=document.getElementById("kEmail").value.trim();

    saveState(); route(location.hash);
  });
}
function importKundenCSV(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const text = reader.result.replace(/^﻿/,"");
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length){ toast("CSV ist leer.", "warn"); return; }
    const delim = lines[0].includes(";") ? ";" : ",";
    const header = lines[0].split(delim).map(h=>h.trim().toLowerCase());
    let count = 0;
    for(let i=1;i<lines.length;i++){
      const cols = lines[i].split(delim);
      const row = {};
      header.forEach((h,idx)=>row[h]=(cols[idx]||"").trim());
      const name = row.name || row.firma || row.kunde;
      if(!name) continue;
      S.kunden.push({id:uid(), name, ansprechpartner:row.ansprechpartner||row.kontakt||"", tel:row.telefon||row.tel||"", email:row.email||row["e-mail"]||"", adresse:row.adresse||"", notizen:""});
      count++;
    }
    saveState(); route(location.hash);
    toast(count + " Kunden importiert.", "success");
  };
  reader.onerror = ()=>toast("CSV konnte nicht gelesen werden.", "error");
  reader.readAsText(file, "utf-8");
}

function renderPlantafel(view){
  if(!window._ptWoche) window._ptWoche = mondayOfWeek(new Date());
  const start = new Date(window._ptWoche);
  const days = [...Array(7)].map((_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });
  view.innerHTML = `
    <div class="pageHead">
      <div><div class="pageTitle">Plantafel</div><div class="pageSub">Personal- &amp; Projekteinsatzplanung</div></div>
      <div style="display:flex; gap:8px;">
        <button class="btn" onclick="ptShiftWeek(-1)">◀</button>
        <button class="btn" onclick="ptShiftWeek(1)">▶</button>
      </div>
    </div>
    <div class="card"><div class="tableWrap"><table>
      <thead><tr><th>Mitarbeiter</th>${days.map(d=>`<th>${new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"})}</th>`).join("")}</tr></thead>
      <tbody>
      ${S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>`
        <tr><td><b>${escHtml(m.name)}</b></td>
        ${days.map(d=>{
          const p = S.planung.find(x=>x.mitarbeiterId===m.id && x.datum===d);
          const proj = p ? S.projekte.find(x=>x.id===p.projektId) : null;
          return `<td style="cursor:pointer; min-width:110px;" onclick="openPlantafelCell('${escAttr(m.id)}','${d}')">${proj?`<span class="badge blue">${escHtml(proj.name)}</span>`:'<span style="color:var(--text-dim2);">–</span>'}</td>`;
        }).join("")}
        </tr>
      `).join("") || `<tr><td colspan="8"><div class="empty">Keine Mitarbeiter</div></td></tr>`}
      </tbody>
    </table></div></div>
  `;
}
function ptShiftWeek(dir){
  const d = new Date(window._ptWoche); d.setDate(d.getDate()+dir*7);
  window._ptWoche = d.toISOString().slice(0,10); route(location.hash);
}
function openPlantafelCell(mid, datum){
  const existing = S.planung.find(x=>x.mitarbeiterId===mid && x.datum===datum);
  openModal(`
    <div class="modalHead"><div class="modalTitle">${escHtml(mitarbeiterName(mid))} – ${fmtDate(datum)}</div><button class="iconBtn" onclick="closeModal()">✖</button></div>
    <div class="formRow"><label>Projekt</label>
      <select id="ptProjekt"><option value="">– keine Zuordnung –</option>${S.projekte.map(p=>`<option value="${escAttr(p.id)}" ${existing&&existing.projektId===p.id?"selected":""}>${escHtml(p.name)}</option>`).join("")}</select>
    </div>
    <div class="modalFoot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn primary" onclick="savePlantafelCell('${escAttr(mid)}','${datum}')">Speichern</button></div>
  `);
}
function savePlantafelCell(mid, datum){
  const projektId = document.getElementById("ptProjekt").value;
  S.planung = S.planung.filter(x=>!(x.mitarbeiterId===mid && x.datum===datum));
  if(projektId) S.planung.push({id:uid(), mitarbeiterId:mid, datum, projektId});
  saveState(); closeModal(); route(location.hash);
}

/* ---- Aufmaß (manuelle Raumvermessung, Shoelace-Formel) ---- */
function calcRaum(raum){
  let heading = 0, x=0, y=0;
  const pts = [[0,0]];
  for(const seg of raum.segmente){
    const rad = heading * Math.PI/180;
    x += (Number(seg.laenge)||0) * Math.cos(rad);
    y += (Number(seg.laenge)||0) * Math.sin(rad);
    pts.push([x,y]);
    const aussenwinkel = 180 - (Number(seg.winkel)||90);
    heading += (seg.drehrichtung==="CCW" ? aussenwinkel : -aussenwinkel);
  }
  const umfangSegmente = raum.segmente.reduce((s,seg)=>s+(Number(seg.laenge)||0),0);
  const first = pts[0], last = pts[pts.length-1];
  const schliessDist = Math.hypot(last[0]-first[0], last[1]-first[1]);
  const geschlossen = schliessDist < 0.05;
  let flaeche = 0;
  for(let i=0;i<pts.length;i++){
    const [x1,y1] = pts[i], [x2,y2] = pts[(i+1)%pts.length];
    flaeche += (x1*y2 - x2*y1);
  }
  flaeche = Math.abs(flaeche)/2;
  const umfang = umfangSegmente + (geschlossen?0:schliessDist);
  const wandflaeche = Math.max(0, umfang*(Number(raum.hoehe)||0) - (Number(raum.abzuege)||0));
  return {pts, flaeche, umfang, wandflaeche, geschlossen};
}

function raumSegChange(i, field, val){

function updateRaumPreview(){
  const c = calcRaum(window._raumDraft);
  const xs = c.pts.map(p=>p[0]), ys = c.pts.map(p=>p[1]);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const w = Math.max(0.5, maxX-minX), h = Math.max(0.5, maxY-minY);
  const pad = Math.max(w,h)*0.15 + 0.2;
  const vbW = w+pad*2, vbH = h+pad*2;
  const svgPts = c.pts.map(p=>`${(p[0]-minX+pad).toFixed(2)},${(p[1]-minY+pad).toFixed(2)}`).join(" ");
  document.getElementById("rSvgPreview").innerHTML = `
    <svg width="220" height="220" viewBox="0 0 ${vbW.toFixed(2)} ${vbH.toFixed(2)}" style="background:var(--card); border-radius:10px; border:1px solid var(--border);">
      <polygon points="${svgPts}" fill="rgba(59,130,246,.25)" stroke="var(--primary)" stroke-width="${(vbW/80).toFixed(3)}"/>
    </svg>`;
  document.getElementById("rCalcOut").innerHTML = `
    Grundfläche: <b>${c.flaeche.toFixed(2)} m²</b><br>
    Umfang: <b>${c.umfang.toFixed(2)} m</b><br>
    Wandfläche: <b>${c.wandflaeche.toFixed(2)} m²</b><br>
    ${!c.geschlossen?'<span class="badge amber">⚠ Raum nicht geschlossen – letztes Segment prüfen</span>':'<span class="badge green">✓ Raum geschlossen</span>'}
  `;
}
function saveRaum(){
  const p = S.projekte.find(x=>x.id===window._raumPid);
  const r = window._raumDraft;
  if(!r.name.trim()){ toast("Raumname erforderlich.", "warn"); return; }
  if(window._raumIsEdit){
    const idx = p.aufmasse.findIndex(x=>x.id===window._raumOrigId);
    p.aufmasse[idx] = r;
  }else{
    p.aufmasse.push(r);
  }
  saveState(); closeModal(); route(location.hash);
  toast("Raum gespeichert.", "success");
}
function deleteRaum(pid, rid){
  confirmDelete("Raum wirklich löschen?", ()=>{
    const p = S.projekte.find(x=>x.id===pid);

    saveState(); route(location.hash);
  });
}
function exportAufmassPDF(pid){
  const p = S.projekte.find(x=>x.id===pid);
  if(!p.aufmasse.length){ toast("Keine Räume zum Exportieren.", "warn"); return; }
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, "Aufmaß-Protokoll");
  doc.setFontSize(11);
  doc.text("Projekt: " + p.name, 15, y); y+=6;
  doc.text("Adresse: " + (p.adresse||"–"), 15, y); y+=10;
  let gesamtFlaeche=0, gesamtWand=0;
  p.aufmasse.forEach(r=>{
    const c = calcRaum(r);
    gesamtFlaeche += c.flaeche; gesamtWand += c.wandflaeche;
    if(y>250){ doc.addPage(); y=20; }
    doc.setFont(undefined,"bold"); doc.text(r.name, 15, y); doc.setFont(undefined,"normal");
    y+=6;
    doc.setFontSize(10);
    doc.text(`Höhe: ${r.hoehe} m   Grundfläche: ${c.flaeche.toFixed(2)} m²   Umfang: ${c.umfang.toFixed(2)} m   Wandfläche: ${c.wandflaeche.toFixed(2)} m²`, 15, y);
    y+=8; doc.setFontSize(11);
  });
  if(y>250){ doc.addPage(); y=20; }
  doc.setFont(undefined,"bold");
  doc.text(`Gesamt Grundfläche: ${gesamtFlaeche.toFixed(2)} m²   Gesamt Wandfläche: ${gesamtWand.toFixed(2)} m²`, 15, y);
  doc.setFont(undefined,"normal");
  pdfFooter(doc);
  doc.save("Aufmass_"+p.name.replace(/[^a-z0-9]+/gi,"_")+".pdf");
}

/* =========================================================
   SHARED PDF BRIEFKOPF/FOOTER (DIN 5008)
========================================================= */
function pdfNewDoc(){
  if(!window.jspdf || !window.jspdf.jsPDF){ throw new Error("PDF-Bibliothek lädt noch. Bitte kurz warten und erneut versuchen."); }
  return new window.jspdf.jsPDF();
}
function pdfHeader(doc, title){
  const f = S.firma;
  let y = 15;
  if(f.logo){
    try{ doc.addImage(f.logo, "JPEG", 15, y, 26, 26, undefined, "FAST"); }
    catch(e){ try{ doc.addImage(f.logo, "PNG", 15, y, 26, 26, undefined, "FAST"); }catch(e2){ /* logo not embeddable, skip silently in PDF only */ } }
  }
  doc.setFontSize(9); doc.setTextColor(90);
  [f.name, f.strasse, [f.plz,f.ort].filter(Boolean).join(" "), f.tel, f.email].filter(Boolean).forEach((l,i)=>{
    doc.text(String(l), 195, y+4+i*4, {align:"right"});
  });
  doc.setTextColor(0);
  y += 32;
  doc.setDrawColor(210); doc.line(15,y,195,y);
  y += 10;
  doc.setFontSize(16); doc.setFont(undefined,"bold");
  doc.text(title, 15, y);
  doc.setFont(undefined,"normal"); doc.setFontSize(10.5);
  return y + 10;
}
function pdfFooter(doc){
  const f = S.firma;
  const pages = doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    const h = doc.internal.pageSize.getHeight();
    doc.setDrawColor(210); doc.line(15,h-24,195,h-24);
    doc.setFontSize(7.5); doc.setTextColor(110);
    const col1 = [f.name, f.geschaeftsfuehrer?("GF: "+f.geschaeftsfuehrer):"", [f.amtsgericht,f.hrb].filter(Boolean).join(" ")].filter(Boolean);
    const col2 = [f.bank, f.iban, f.bic].filter(Boolean);
    const col3 = [f.steuernr?("St-Nr: "+f.steuernr):"", f.ustid?("USt-ID: "+f.ustid):"", f.tel, f.email].filter(Boolean);
    col1.forEach((l,idx)=>doc.text(String(l),15,h-19+idx*3.4));
    col2.forEach((l,idx)=>doc.text(String(l),80,h-19+idx*3.4));
    col3.forEach((l,idx)=>doc.text(String(l),145,h-19+idx*3.4));
    doc.setTextColor(0); doc.setFontSize(8);
    doc.text("Seite "+i+" / "+pages, 195, h-6, {align:"right"});
  }
}
function pdfTable(doc, y, headers, rows, colWidths, colX){
  doc.setFontSize(9); doc.setFont(undefined,"bold");
  headers.forEach((h,i)=>doc.text(h, colX[i], y));
  doc.setFont(undefined,"normal");
  doc.setDrawColor(210); doc.line(15,y+2,195,y+2);
  y += 7;
  rows.forEach(row=>{
    if(y>270){ doc.addPage(); y=20; }
    row.forEach((cell,i)=>doc.text(String(cell), colX[i], y, i===row.length-1?{align:"right"}:{}));
    y += 6;
  });
  return y;
}

  let y = pdfHeader(doc, "Rechnung "+r.nr);

  doc.text("Rechnungsdatum: "+fmtDate(r.datum), 140, y-14);
  doc.text("Fällig: "+fmtDate(r.faellig), 140, y-9);
  y += 8;
  y = pdfTable(doc, y, ["Beschreibung","Menge","Einheit","Preis","Summe"], r.positionen.map(p=>[p.beschreibung, p.menge, p.einheit, fmtCurrency(p.preis), fmtCurrency(p.menge*p.preis)]), null, [15,110,130,150,195]);
  y += 6;
  doc.setDrawColor(210); doc.line(120,y,195,y); y+=6;
  doc.text("Netto:", 150, y); doc.text(fmtCurrency(rechnungNetto(r)), 195, y, {align:"right"}); y+=6;
  doc.text("MwSt 19%:", 150, y); doc.text(fmtCurrency(rechnungMwst(r)), 195, y, {align:"right"}); y+=6;
  doc.setFont(undefined,"bold");
  doc.text("Gesamt:", 150, y); doc.text(fmtCurrency(rechnungSumme(r)), 195, y, {align:"right"});
  doc.setFont(undefined,"normal");
  if(r.notiz){ y+=12; doc.setFontSize(9); doc.text(doc.splitTextToSize(r.notiz,180), 15, y); }
  pdfFooter(doc);
  doc.save(r.nr+".pdf");
}
function exportDatevCSV(){

function setupSigCanvas(canvasId, existingDataURL){
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(existingDataURL){ const img = new Image(); img.onload=()=>ctx.drawImage(img,0,0,canvas.width,canvas.height); img.src=existingDataURL; }
  let drawing=false;
  const pos = e=>{ const rect=canvas.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top; return {x:cx*canvas.width/rect.width, y:cy*canvas.height/rect.height}; };
  const start = e=>{ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); };
  const move = e=>{ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle="#111"; ctx.lineWidth=2; ctx.lineCap="round"; ctx.stroke(); e.preventDefault(); };
  const end = ()=>{ drawing=false; window._vertragDraft["unterschrift"+(canvasId==="sigAG"?"AG":"AN")] = canvas.toDataURL("image/png"); };
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move); window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start); canvas.addEventListener("touchmove", move); canvas.addEventListener("touchend", end);
}
function clearSig(canvasId){
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  window._vertragDraft["unterschrift"+(canvasId==="sigAG"?"AG":"AN")] = "";
}

  if(isEdit){ const idx=S.vertraege.findIndex(x=>x.id===v.id); S.vertraege[idx]=v; }
  else S.vertraege.push(v);

  toast("Vertrag gespeichert.", "success");
}
function deleteVertrag(id){

function exportVertragPDF(id){

  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  let drawing=false;
  const pos = e=>{ const rect=canvas.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top; return {x:cx*canvas.width/rect.width, y:cy*canvas.height/rect.height}; };
  const start = e=>{ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); };
  const move = e=>{ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle="#111"; ctx.lineWidth=2; ctx.lineCap="round"; ctx.stroke(); e.preventDefault(); };
  const end = ()=>{ drawing=false; onChange(canvas.toDataURL("image/png")); };
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move); window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start); canvas.addEventListener("touchmove", move); canvas.addEventListener("touchend", end);
}
function clearVoSig(){
  const canvas = document.getElementById("voSig"); const ctx = canvas.getContext("2d");

function exportLohnCSV(){
  const monat = document.getElementById("datevMonat").value;
  const rows = S.mitarbeiter.filter(m=>m.status!=="inaktiv").map(m=>{
    const entries = S.zeiterfassung.filter(z=>z.mitarbeiterId===m.id && z.datum && z.datum.startsWith(monat) && z.kommen && z.gehen);
    const stunden = entries.reduce((s,e)=>s+hoursBetween(e.kommen,e.gehen),0);

    return [m.name, monat, stunden.toFixed(2), (m.stundenlohn||0).toFixed(2), lohn.toFixed(2)];

  download(csv, "DATEV_Lohn_"+monat+".csv", "text/csv;charset=utf-8");
}

/* =========================================================
   KI-ASSISTENT (Gemini)
========================================================= */
async function callGemini(prompt, apiKey){
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + encodeURIComponent(apiKey);
  const res = await fetch(url, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  if(!res.ok){
    const t = await res.text().catch(()=> "");
    throw new Error("HTTP "+res.status+" – "+t.slice(0,200));
  }
  const data = await res.json();
  const text = data && data.candidates && data.candidates[0] && data.candidates[0].content
    ? data.candidates[0].content.parts.map(p=>p.text).join("")
    : "Keine Antwort erhalten.";
  return text;
}

let cloudSyncStatus = {state:"idle", msg:""};
function getSupabaseClient(){
  if(!LC.cloudSyncEnabled || !LC.supabaseUrl || !LC.supabaseAnonKey) return null;
  if(!window.supabase || !window.supabase.createClient) return null;
  const key = LC.supabaseUrl+"|"+LC.supabaseAnonKey+"|"+LC.freigabeCode;
  if(!_sbClient || _sbClientKey!==key){
    _sbClient = window.supabase.createClient(LC.supabaseUrl, LC.supabaseAnonKey, {
      global: { headers: { "x-erm-token": LC.freigabeCode || "" } }
    });
    _sbClientKey = key;
  }
  return _sbClient;
}
function setCloudStatus(state, msg){
  cloudSyncStatus = {state, msg: msg||""};
  const el = document.getElementById("cloudStatusOut");
  if(el) el.innerHTML = cloudStatusHTML();
}
function cloudStatusHTML(){
  const map = {idle:["gray","Nicht verbunden"], syncing:["amber","Synchronisiere..."], ok:["green","Verbunden – aktuell"], error:["red","Fehler: "+escHtml(cloudSyncStatus.msg)]};
  const [cls,label] = map[cloudSyncStatus.state]||map.idle;
  return `<span class="badge ${cls}">${label}</span>`;
}
function cloudSyncPush(){
  if(!LC.cloudSyncEnabled) return;
  clearTimeout(_cloudPushTimer);
  _cloudPushTimer = setTimeout(async ()=>{
    const sb = getSupabaseClient();
    if(!sb) return;
    setCloudStatus("syncing");
    try{
      const { error } = await sb.from("erm_data").update({ payload: S, updated_at: new Date().toISOString() }).eq("id",1);
      if(error) throw error;
      setCloudStatus("ok");
    }catch(e){
      setCloudStatus("error", e.message);
    }
  }, 800);
}
async function cloudSyncPull(initial){
  const sb = getSupabaseClient();
  if(!sb) return;
  setCloudStatus("syncing");
  try{
    const { data, error } = await sb.from("erm_data").select("payload,updated_at").eq("id",1).single();
    if(error) throw error;
    if(data && data.payload){
      S = ensureShape(data.payload);
      try{ await idbSet("main", JSON.stringify(S)); }catch(e){}
      try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
      if(!initial){ buildSidebar(); route(location.hash); }
    }
    setCloudStatus("ok");
  }catch(e){
    setCloudStatus("error", e.message);
    if(!initial) toast("Cloud-Sync Abruf fehlgeschlagen: "+e.message, "error");
  }
}
function subscribeRealtime(){
  const sb = getSupabaseClient();
  if(!sb) return;
  if(_rtChannel){ try{ sb.removeChannel(_rtChannel); }catch(e){} }
  _rtChannel = sb.channel("erm_data_changes")
    .on("postgres_changes", {event:"UPDATE", schema:"public", table:"erm_data"}, payload=>{
      if(payload.new && payload.new.payload){
        S = ensureShape(payload.new.payload);
        idbSet("main", JSON.stringify(S)).catch(()=>{});
        try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
        buildSidebar(); route(location.hash);
        toast("🔄 Daten von einem anderen Gerät aktualisiert.", "success");
      }
    })
    .subscribe();
}
async function initCloudSyncIfEnabled(){
  if(!LC.cloudSyncEnabled) return;
  if(!window.supabase){
    setTimeout(initCloudSyncIfEnabled, 500);
    return;
  }
  await cloudSyncPull(true);
  subscribeRealtime();
}
async function testCloudConnection(){
  const sb = getSupabaseClient();
  if(!sb){ toast("Bitte Supabase-URL, Anon-Key und Freigabe-Code eintragen.", "warn"); return; }
  setCloudStatus("syncing");
  try{
    const { error } = await sb.from("erm_data").select("id").eq("id",1).single();
    if(error) throw error;
    setCloudStatus("ok");
    toast("Verbindung erfolgreich!", "success");
  }catch(e){
    setCloudStatus("error", e.message);
    toast("Verbindung fehlgeschlagen: "+e.message, "error");
  }
}

/* =========================================================

========================================================= */
function urlBase64ToUint8Array(base64String){
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
async function enablePush(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){ toast("Push-Benachrichtigungen werden von diesem Browser nicht unterstützt.", "warn"); return; }
  if(!LC.vapidPublicKey){ toast("Bitte zuerst VAPID Public Key eintragen.", "warn"); return; }
  try{
    const reg = await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if(perm!=="granted"){ toast("Benachrichtigungen wurden nicht erlaubt.", "warn"); return; }
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(LC.vapidPublicKey) });
    }
    await savePushSubscriptionToCloud(sub);
    LC.pushEnabled = true; saveLC();
    toast("Push-Benachrichtigungen aktiviert.", "success");
    renderEinstellungen(document.getElementById("view"));
  }catch(e){ toast("Push-Setup fehlgeschlagen: "+e.message, "error"); }
}
async function savePushSubscriptionToCloud(sub){
  const sb = getSupabaseClient();
  if(!sb){ toast("Cloud-Sync muss aktiviert sein, damit Server-Push funktioniert.", "warn"); return; }
  const json = sub.toJSON();
  try{
    const { error } = await sb.from("push_subscriptions").upsert(
      { endpoint: json.endpoint, p256dh: json.keys.p256dh, auth: json.keys.auth, org_id:"ib_raumkonzept" },
      { onConflict:"endpoint" }
    );
    if(error) throw error;
  }catch(e){ toast("Push-Subscription konnte nicht in der Cloud gespeichert werden: "+e.message, "error"); }
}
async function disablePush(){
  try{
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub){
      const endpoint = sub.endpoint;
      await sub.unsubscribe();
      const sb = getSupabaseClient();
      if(sb){ await sb.from("push_subscriptions").delete().eq("endpoint", endpoint).then(()=>{}).catch(()=>{}); }
    }
  }catch(e){ /* best-effort cleanup */ }
  LC.pushEnabled = false; saveLC();
  renderEinstellungen(document.getElementById("view"));
}
function startLocalReminderLoop(){
  checkLocalReminders();
  setInterval(checkLocalReminders, 30*60*1000);
}
function checkLocalReminders(){
  if(LC.cloudSyncEnabled && LC.pushEnabled) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const heute = todayISO();
  S.rechnungen.filter(r=>rechnungEffectiveStatus(r)==="überfällig").forEach(r=>{
    try{ new Notification("Rechnung überfällig", {body: r.nr+" – "+kundeName(r.kundeId), tag:"rechnung-"+r.id}); }catch(e){}
  });
  S.fuhrpark.filter(f=>{
    if(!f.tuev) return false;
    const days = (new Date(f.tuev)-new Date(heute))/86400000;
    return days>=0 && days<=7;
  }).forEach(f=>{
    try{ new Notification("TÜV-Frist läuft bald ab", {body:f.kennzeichen, tag:"tuev-"+f.id}); }catch(e){}
  });
}
async function enableLocalNotifications(){
  if(!("Notification" in window)){ toast("Benachrichtigungen werden von diesem Browser nicht unterstützt.", "warn"); return; }
  const perm = await Notification.requestPermission();
  if(perm==="granted"){ toast("Lokale Erinnerungen aktiviert.", "success"); checkLocalReminders(); }
  else toast("Benachrichtigungen wurden nicht erlaubt.", "warn");
  renderEinstellungen(document.getElementById("view"));
}

const SUPABASE_SQL_SETUP = `-- ERM IB Raumkonzept: Supabase Setup
create extension if not exists pgcrypto;

create table if not exists erm_access (
  id int primary key default 1,
  code_hash text not null
);

create table if not exists erm_data (
  id int primary key default 1,
  org_id text not null default 'ib_raumkonzept',
  payload jsonb not null default '{}'::jsonb,
  updated_at timestamptz not null default now()
);
insert into erm_data (id, org_id, payload) values (1, 'ib_raumkonzept', '{}'::jsonb)
  on conflict (id) do nothing;

create table if not exists push_subscriptions (
  endpoint text primary key,
  p256dh text not null,
  auth text not null,
  org_id text not null default 'ib_raumkonzept',
  created_at timestamptz not null default now()
);

create or replace function erm_check_token(token text)
returns boolean language sql security definer as $$
  select exists(
    select 1 from erm_access
    where id = 1 and code_hash = encode(digest(coalesce(token,''), 'sha256'), 'hex')
  );
$$;

alter table erm_data enable row level security;
alter table push_subscriptions enable row level security;

create policy "erm_data_access" on erm_data for all
  using ( erm_check_token(current_setting('request.headers', true)::json->>'x-erm-token') )
  with check ( erm_check_token(current_setting('request.headers', true)::json->>'x-erm-token') );

create policy "push_subscriptions_access" on push_subscriptions for all
  using ( erm_check_token(current_setting('request.headers', true)::json->>'x-erm-token') )
  with check ( erm_check_token(current_setting('request.headers', true)::json->>'x-erm-token') );

alter publication supabase_realtime add table erm_data;

-- Freigabe-Code setzen/ändern (ERSETZEN Sie 'IhrFreigabeCode123' und führen Sie dies erneut aus, um ihn zu ändern):
insert into erm_access (id, code_hash) values (1, encode(digest('IhrFreigabeCode123', 'sha256'), 'hex'))
  on conflict (id) do update set code_hash = excluded.code_hash;
`;

      <div class="pageSub" style="margin:8px 0 16px;">Kostenloser API-Key von <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>. Wird nur lokal auf diesem Gerät gespeichert, nie in die Cloud synchronisiert.</div>
      <div class="formRow"><label>Gemini API-Key</label><input id="kiKey" type="password" value="${escAttr(getGeminiKey())}"></div>
      <button class="btn primary" onclick="saveKIKey()">Speichern</button>
    </div>
  `;
}
function saveKIKey(){
  setGeminiKey(document.getElementById("kiKey").value.trim());
  toast("API-Key gespeichert (nur lokal).", "success");
}
function renderSetPush(body){
  body.innerHTML = `
    <div class="card" style="max-width:640px;">
      <b>🔔 Benachrichtigungen</b>
      <div class="pageSub" style="margin:8px 0 16px;">Server-Push (funktioniert auch bei geschlossener App) benötigt Cloud-Sync + VAPID-Schlüssel. Ohne Server-Push wird ein lokaler Erinnerungs-Check alle 30 Minuten genutzt, solange die App geöffnet ist.</div>
      <div class="formRow"><label>VAPID Public Key</label><input id="pushVapid" type="text" value="${escAttr(LC.vapidPublicKey)}"></div>
      <button class="btn" onclick="saveVapidKey()" style="margin-bottom:16px;">Speichern</button>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn primary" onclick="enablePush()" ${LC.pushEnabled?"disabled":""}>🔔 Server-Push aktivieren</button>
        ${LC.pushEnabled?`<button class="btn danger" onclick="disablePush()">Server-Push deaktivieren</button>`:""}
        <button class="btn" onclick="enableLocalNotifications()">📱 Lokale Erinnerungen erlauben</button>
      </div>
      <div class="pageSub" style="margin-top:14px;">Status Server-Push: ${LC.pushEnabled?'<span class="badge green">aktiv</span>':'<span class="badge gray">inaktiv</span>'}</div>
    </div>
  `;
}
function saveVapidKey(){
  LC.vapidPublicKey = document.getElementById("pushVapid").value.trim();
  saveLC();
  toast("VAPID Key gespeichert.", "success");
}
function renderSetInstall(body){
  body.innerHTML = `
    <div class="grid cols-2">
      <div class="card">
        <b>📱 iPhone / iPad (Safari)</b>
        <ol style="font-size:13px; line-height:2; color:var(--text-dim); padding-left:20px;">
          <li>Seite in Safari öffnen</li>
          <li>Teilen-Symbol (Quadrat mit Pfeil) antippen</li>
          <li>„Zum Home-Bildschirm" wählen</li>
          <li>„Hinzufügen" bestätigen</li>
        </ol>
      </div>
      <div class="card">
        <b>🤖 Android (Chrome)</b>
        <ol style="font-size:13px; line-height:2; color:var(--text-dim); padding-left:20px;">
          <li>Seite in Chrome öffnen</li>
          <li>Menü (⋮) oben rechts öffnen</li>
          <li>„App installieren" bzw. „Zum Startbildschirm hinzufügen" wählen</li>
        </ol>
      </div>
      <div class="card">
        <b>💻 Desktop (Chrome/Edge)</b>
        <ol style="font-size:13px; line-height:2; color:var(--text-dim); padding-left:20px;">
          <li>Install-Symbol in der Adressleiste anklicken</li>
          <li>oder Menü → „App installieren"</li>
        </ol>
      </div>
      <div class="card">
        <b>👥 Verteilung an Mitarbeiter</b>
        <div style="font-size:13px; color:var(--text-dim); line-height:1.8;">
          Diese App liegt auf Netlify und wird per Git-Push automatisch aktualisiert. Einfach den Netlify-Link (z.B. <code>https://ib-raumkonzept.netlify.app</code>) per WhatsApp/E-Mail an das Team senden – jeder installiert ihn wie oben beschrieben auf dem eigenen Gerät. Für Cloud-Sync zusätzlich den Freigabe-Code oder QR-Code aus „Cloud Sync" teilen.
        </div>
      </div>
    </div>
  `;
}
function renderSetBackup(body){
  body.innerHTML = `
    <div class="grid cols-2">
      <div class="card">
        <b>💾 Backup (JSON)</b>
        <div class="pageSub" style="margin:8px 0 14px;">Vollständige Sicherung aller Daten inkl. Fotos/Dokumente.</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn primary" onclick="exportBackupJSON()">⬇ Backup exportieren</button>
          <label class="btn" style="margin:0;">⬆ Backup importieren<input type="file" accept=".json" style="display:none;" onchange="importBackupJSON(this)"></label>
        </div>
      </div>
      <div class="card">
        <b>📊 CSV-Export</b>
        <div class="pageSub" style="margin:8px 0 14px;">Mitarbeiter, Kunden, Projekte, Rechnungen als CSV.</div>
        <button class="btn primary" onclick="exportAllCSV()">⬇ CSV-Dateien exportieren</button>
      </div>
      <div class="card" style="border-color:var(--red);">
        <b style="color:var(--red);">⚠️ Daten-Reset</b>
        <div class="pageSub" style="margin:8px 0 14px;">Löscht alle lokalen Daten unwiderruflich. Vorher Backup exportieren!</div>
        <button class="btn danger" onclick="resetAllData()">Alle Daten zurücksetzen</button>
      </div>
    </div>
  `;
}

reg("einstellungen","Einstellungen","⚙️","System",renderEinstellungen);

/* =========================================================
   INIT
========================================================= */
async function boot(){
  loadLC();
  await loadState();
  document.documentElement.setAttribute("data-theme", LC.theme || "dark");
  buildSidebar();
  renderLogin();
  applyBranding();
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js").catch(()=>{ /* offline-first still works without SW */ });
  }
  initCloudSyncIfEnabled();
  startLocalReminderLoop();
}
document.addEventListener("DOMContentLoaded", boot);
</script>
</body>
</html>
