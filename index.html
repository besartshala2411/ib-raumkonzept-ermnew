        </label>`
      : `<div class="formRow"><label>${escHtml(fd.label)}</label>
        ${fd.typ==="textarea"?`<div class="micWrap"><textarea id="voFeld${i}" style="min-height:110px;" oninput="window._vorlageDraft.werte['${escAttr(fd.label)}']=this.value" placeholder="Notizblock – frei eintragen..."></textarea>${fieldMic("voFeld"+i)}</div>`
        : fd.typ==="date" ? `<input id="voFeld${i}" type="date" value="${todayISO()}" oninput="window._vorlageDraft.werte['${escAttr(fd.label)}']=this.value">`
        : `<div class="micWrap"><input id="voFeld${i}" type="text" oninput="window._vorlageDraft.werte['${escAttr(fd.label)}']=this.value">${fieldMic("voFeld"+i)}</div>`}
      </div>`}
    `).join("")}
    ${sigPadHTML("voSig", "Unterschrift")}
    <div class="modalFoot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn primary" onclick="saveVorlageInstanz()">Speichern</button></div>
  `, true);
  initSigPad("voSig", "", v=>window._vorlageDraft.unterschrift=v);
}
function buildVorlagePDFDoc(v){
  const def = VORLAGEN_DEFS.find(x=>x.id===v.defId);
  const doc = pdfNewDoc();
  let y = pdfHeader(doc, (def?def.name:"Vorlage"));
  doc.setFontSize(10);
  if(v.projektId) { doc.text("Projekt: "+projektName(v.projektId), 15, y); y+=8; }
  (def?def.felder:[]).forEach(f=>{
    if(y>260){ doc.addPage(); y=20; }
    const val = v.werte[f.label]||(f.typ==="checkbox"?"Nein":"");
    if(f.typ==="checkbox"){
      doc.text((val==="Ja"?"☑ ":"☐ ")+f.label, 15, y);
      y += 7;
    }else{
      doc.setFont(undefined,"bold"); doc.text(f.label+":", 15, y); doc.setFont(undefined,"normal");
      const lines = doc.splitTextToSize(String(val), 130);
      doc.text(lines, 65, y);
      y += Math.max(6, lines.length*5) + 3;
    }
  });
  y += 10;
  if(v.unterschrift){
    if(y>230){ doc.addPage(); y=20; }
    try{ doc.addImage(v.unterschrift,"PNG",15,y,60,26); }catch(e){}
    y+=28; doc.line(15,y,80,y); y+=5;
    doc.setFontSize(9); doc.text("Unterschrift", 15, y);
  }
  pdfFooter(doc);
  return doc;
}
function saveVorlageInstanz(){
  const v = window._vorlageDraft;
  S.vorlagen.push(v);
  if(v.projektId){
    try{
      const doc = buildVorlagePDFDoc(v);
      const dataURL = doc.output("datauristring");
      const p = S.projekte.find(x=>x.id===v.projektId);
      p.dokumente.push({id:uid(), name:vorlagenDefName(v.defId)+"_"+v.datum+".pdf", dataURL, projektId:v.projektId, datum:new Date().toISOString(), vorlageRef:v.id});
    }catch(e){
      toast("Vorlage wurde gespeichert, aber PDF konnte nicht im Projekt hinterlegt werden: "+e.message, "warn");
    }
  }
  saveState(); closeModal(); route(location.hash);
  toast(v.projektId ? "Vorlage gespeichert und im Projekt hinterlegt." : "Vorlage gespeichert.", "success");
}
function deleteVorlageInstanz(id){
  deleteItemWithUndo(S.vorlagen, id, "Vorlage gelöscht.");
}
function exportVorlagePDF(id){
  const v = S.vorlagen.find(x=>x.id===id);
  const def = VORLAGEN_DEFS.find(x=>x.id===v.defId);
  const doc = buildVorlagePDFDoc(v);
  doc.save((def?def.name:"Vorlage").replace(/[^a-z0-9]+/gi,"_")+"_"+v.datum+".pdf");
}

function renderBerichte(view){
  const jahr = new Date().getFullYear();
  const rechnungenJahr = S.rechnungen.filter(r=>r.datum && r.datum.startsWith(String(jahr)));
  const umsatzJahr = rechnungenJahr.reduce((s,r)=>s+rechnungSumme(r),0);
  const bezahltJahr = rechnungenJahr.filter(r=>r.status==="bezahlt").reduce((s,r)=>s+rechnungSumme(r),0);
  const perProjekt = S.projekte.map(p=>({p, umsatz: S.rechnungen.filter(r=>r.projektId===p.id).reduce((s,r)=>s+rechnungSumme(r),0)})).sort((a,b)=>b.umsatz-a.umsatz).slice(0,8);
  const maxUmsatz = Math.max(1, ...perProjekt.map(x=>x.umsatz));
  const stundenGesamt = S.zeiterfassung.filter(z=>z.kommen&&z.gehen).reduce((s,z)=>s+hoursBetween(z.kommen,z.gehen),0);

  view.innerHTML = `
    <div class="pageHead"><div><div class="pageTitle">Berichte &amp; KPIs</div><div class="pageSub">Kennzahlen ${jahr}</div></div></div>
    <div class="grid cols-4" style="margin-bottom:18px;">
      <div class="kpi"><div class="kpiIcon">💶</div><div class="kpiVal">${fmtCurrency(umsatzJahr)}</div><div class="kpiLabel">Umsatz ${jahr} (Rechnungen)</div></div>
      <div class="kpi"><div class="kpiIcon">✅</div><div class="kpiVal">${fmtCurrency(bezahltJahr)}</div><div class="kpiLabel">Davon bezahlt</div></div>
      <div class="kpi"><div class="kpiIcon">🏢</div><div class="kpiVal">${S.projekte.length}</div><div class="kpiLabel">Projekte gesamt</div></div>
      <div class="kpi"><div class="kpiIcon">⏱️</div><div class="kpiVal">${stundenGesamt.toFixed(0)} h</div><div class="kpiLabel">Erfasste Stunden gesamt</div></div>
    </div>
    <div class="card">
      <b>Umsatz nach Projekt (Top 8)</b>
      <div style="margin-top:14px; display:flex; flex-direction:column; gap:10px;">
        ${perProjekt.map(x=>`
          <div>
            <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;"><span>${escHtml(x.p.name)}</span><span>${fmtCurrency(x.umsatz)}</span></div>
            <div class="progressBar"><div style="width:${(x.umsatz/maxUmsatz*100).toFixed(1)}%"></div></div>
          </div>
        `).join("") || `<div class="empty">Keine Daten.</div>`}
      </div>
    </div>
  `;
}

async function callGemini(prompt, apiKey){
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + encodeURIComponent(apiKey);
  const res = await fetch(url, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  if(!res.ok){
    const t = await res.text().catch(()=> "");
    throw new Error("HTTP "+res.status+" – "+t.slice(0,200));
  }
  const data = await res.json();
  const text = data && data.candidates && data.candidates[0] && data.candidates[0].content
    ? data.candidates[0].content.parts.map(p=>p.text).join("")
    : "Keine Antwort erhalten.";
  return text;
}

========================================================= */
let _sbClient = null, _rtChannel = null, _cloudPushTimer = null;
let cloudSyncStatus = {state:"idle", msg:""};
function getSupabaseClient(){
  if(!window.supabase || !window.supabase.createClient) return null;
  if(!_sbClient){
    _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });
  }
  return _sbClient;
}
function setCloudStatus(state, msg){
  cloudSyncStatus = {state, msg: msg||""};
  const el = document.getElementById("cloudStatusOut");
  if(el) el.innerHTML = cloudStatusHTML();
}
function cloudStatusHTML(){
  const shortMsg = String(cloudSyncStatus.msg||"").slice(0,140);
  const map = {idle:["gray","Nicht verbunden"], syncing:["amber","Synchronisiere..."], ok:["green","Verbunden – aktuell"], error:["red","Fehler: "+escHtml(shortMsg)]};
  const [cls,label] = map[cloudSyncStatus.state]||map.idle;
  return `<span class="badge ${cls}">${label}</span>`;
}
function cloudSyncPush(){
  if(!LC.cloudSyncEnabled) return;
  clearTimeout(_cloudPushTimer);
  _cloudPushTimer = setTimeout(async ()=>{
    const sb = getSupabaseClient();
    if(!sb) return;
    setCloudStatus("syncing");
    try{
      const { error } = await sb.from("erm_data").update({ payload: S, updated_at: new Date().toISOString() }).eq("id",1);
      if(error) throw error;
      setCloudStatus("ok");
    }catch(e){
      setCloudStatus("error", e.message);
    }
  }, 800);
}
async function cloudSyncPull(initial){
  const sb = getSupabaseClient();
  if(!sb) return;
  setCloudStatus("syncing");
  try{
    const { data, error } = await sb.from("erm_data").select("payload,updated_at").eq("id",1).single();
    if(error) throw error;
    if(data && data.payload){
      if(typeof data.payload !== "object" || Array.isArray(data.payload)){
        throw new Error("Cloud-Daten haben ein ungültiges Format (payload ist kein Objekt, sondern " + typeof data.payload + "). Bitte in Supabase die Spalte 'payload' der Zeile mit id=1 in Tabelle erm_data auf '{}' zurücksetzen.");
      }
      const localCurrentUserId = S.currentUserId;
      S = ensureShape(data.payload);
      S.currentUserId = localCurrentUserId;
      try{ await idbSet("main", JSON.stringify(S)); }catch(e){}
      try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
      if(!initial){ buildSidebar(); route(location.hash); }
    }
    setCloudStatus("ok");
  }catch(e){
    setCloudStatus("error", e.message);
    if(!initial) toast("Cloud-Sync Abruf fehlgeschlagen: "+String(e.message).slice(0,180), "error");
  }
}
function subscribeRealtime(){
  const sb = getSupabaseClient();
  if(!sb) return;
  if(_rtChannel){ try{ sb.removeChannel(_rtChannel); }catch(e){} }
  _rtChannel = sb.channel("erm_data_changes")
    .on("postgres_changes", {event:"UPDATE", schema:"public", table:"erm_data"}, payload=>{
      if(payload.new && payload.new.payload && typeof payload.new.payload==="object" && !Array.isArray(payload.new.payload)){
        const localCurrentUserId = S.currentUserId;
        S = ensureShape(payload.new.payload);
        S.currentUserId = localCurrentUserId;
        idbSet("main", JSON.stringify(S)).catch(()=>{});
        try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
        buildSidebar(); route(location.hash);
        toast("🔄 Daten von einem anderen Gerät aktualisiert.", "success");
      }
    })
    .subscribe();
}
async function initCloudSyncIfEnabled(){
  if(!LC.cloudSyncEnabled) return;
  if(!window.supabase){
    setTimeout(initCloudSyncIfEnabled, 500);
    return;
  }
  await cloudSyncPull(true);
  subscribeRealtime();
}

}

========================================================= */
function urlBase64ToUint8Array(base64String){
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
async function enablePush(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){ toast("Push-Benachrichtigungen werden von diesem Browser nicht unterstützt.", "warn"); return; }
  if(!LC.vapidPublicKey){ toast("Bitte zuerst VAPID Public Key eintragen.", "warn"); return; }
  try{
    const reg = await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if(perm!=="granted"){ toast("Benachrichtigungen wurden nicht erlaubt.", "warn"); return; }
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(LC.vapidPublicKey) });
    }
    await savePushSubscriptionToCloud(sub);
    LC.pushEnabled = true; saveLC();
    toast("Push-Benachrichtigungen aktiviert.", "success");
    renderEinstellungen(document.getElementById("view"));
  }catch(e){ toast("Push-Setup fehlgeschlagen: "+e.message, "error"); }
}
async function savePushSubscriptionToCloud(sub){
  const sb = getSupabaseClient();
  if(!sb){ toast("Cloud-Sync muss aktiviert sein, damit Server-Push funktioniert.", "warn"); return; }
  const json = sub.toJSON();
  try{
    const { error } = await sb.from("push_subscriptions").upsert(
      { endpoint: json.endpoint, p256dh: json.keys.p256dh, auth: json.keys.auth, org_id:"ib_raumkonzept" },
      { onConflict:"endpoint" }
    );
    if(error) throw error;
  }catch(e){ toast("Push-Subscription konnte nicht in der Cloud gespeichert werden: "+e.message, "error"); }
}
async function disablePush(){
  try{
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub){
      const endpoint = sub.endpoint;
      await sub.unsubscribe();
      const sb = getSupabaseClient();
      if(sb){ await sb.from("push_subscriptions").delete().eq("endpoint", endpoint).then(()=>{}).catch(()=>{}); }
    }
  }catch(e){ /* best-effort cleanup */ }
  LC.pushEnabled = false; saveLC();
  renderEinstellungen(document.getElementById("view"));
}
function startLocalReminderLoop(){

}
function pflichtAlleAblaufwarnungen(){
  const warnungen = [];
  ["mitarbeiter","subunternehmer","kunden"].forEach(type=>{
    pflichtEntityArray(type).forEach(entity=>{
      (entity.dokumente||[]).filter(d=>d.pflichttyp).forEach(doc=>{
        const status = pflichtDocStatus(doc);
        if(status==="expiring" || status==="expired"){
          const entityName = type==="mitarbeiter" ? entity.name : type==="subunternehmer" ? entity.firma : entity.name;
          warnungen.push({type, entityId:entity.id, entityName, dokName:doc.pflichttyp, gueltigBis:doc.gueltigBis, status});
        }
      });
    });
  });
  return warnungen;
}
function checkLocalReminders(){
  if(LC.cloudSyncEnabled && LC.pushEnabled) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const heute = todayISO();
  S.rechnungen.filter(r=>rechnungEffectiveStatus(r)==="überfällig").forEach(r=>{
    try{ new Notification("Rechnung überfällig", {body: r.nr+" – "+kundeName(r.kundeId), tag:"rechnung-"+r.id}); }catch(e){}
  });
  S.fuhrpark.filter(f=>{
    if(!f.tuev) return false;
    const days = (new Date(f.tuev)-new Date(heute))/86400000;
    return days>=0 && days<=7;
  }).forEach(f=>{
    try{ new Notification("TÜV-Frist läuft bald ab", {body:f.kennzeichen, tag:"tuev-"+f.id}); }catch(e){}
  });
  pflichtAlleAblaufwarnungen().forEach(w=>{
    try{
      new Notification(w.status==="expired" ? "Pflichtdokument abgelaufen" : "Pflichtdokument läuft bald ab", {
        body: `${w.dokName} – ${w.entityName}${w.gueltigBis?" (bis "+fmtDate(w.gueltigBis)+")":""}`,
        tag: "pflichtdok-"+w.type+"-"+w.entityId+"-"+w.dokName
      });
    }catch(e){}
  });
}
async function enableLocalNotifications(){
  if(!("Notification" in window)){ toast("Benachrichtigungen werden von diesem Browser nicht unterstützt.", "warn"); return; }
  const perm = await Notification.requestPermission();
  if(perm==="granted"){ toast("Lokale Erinnerungen aktiviert.", "success"); checkLocalReminders(); }
  else toast("Benachrichtigungen wurden nicht erlaubt.", "warn");
  renderEinstellungen(document.getElementById("view"));
}

function getDataURLDimensions(dataURL){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>resolve({width:img.naturalWidth||img.width, height:img.naturalHeight||img.height});
    img.onerror = ()=>reject(new Error("Bildabmessungen konnten nicht ermittelt werden"));
    img.src = dataURL;
  });
}
async function uploadFirmaLogo(input){
  const file = input.files[0]; if(!file) return;
  try{
    const dataURL = await compressImage(file, 512, 0.85);
    const dims = await getDataURLDimensions(dataURL).catch(()=>null);
    window._firmaDraft.logo = dataURL;
    S.firma.logo = dataURL;
    if(dims && dims.width && dims.height){
      window._firmaDraft.logoAspect = dims.width/dims.height;
      S.firma.logoAspect = dims.width/dims.height;
    }
    saveState();
    applyBranding(); buildSidebar();
    renderEinstellungen(document.getElementById("view"), "firma");
    toast("Logo aktualisiert.", "success");
  }catch(e){ toast("Logo konnte nicht verarbeitet werden: "+e.message, "error"); }
}
async function uploadFirmaIcon(input){
  const file = input.files[0]; if(!file) return;
  try{
    const dataURL = await compressImage(file, 256, 0.9);
    window._firmaDraft.icon = dataURL;
    S.firma.icon = dataURL;
    saveState();
    applyBranding(); buildSidebar();
    renderEinstellungen(document.getElementById("view"), "firma");
    toast("App-Icon aktualisiert.", "success");
  }catch(e){ toast("Icon konnte nicht verarbeitet werden: "+e.message, "error"); }
}

  doc.save((d.betreff||"Brief").replace(/[^a-z0-9]+/gi,"_")+".pdf");

function waitForSupabaseSDK(){
  return new Promise(resolve=>{
    let tries = 0;
    const iv = setInterval(()=>{
      tries++;
      if((window.supabase && window.supabase.createClient) || tries>20){ clearInterval(iv); resolve(); }
    }, 100);
  });
}
async function boot(){
  loadLC();
  await loadState();
  document.documentElement.setAttribute("data-theme", LC.theme || "dark");
  buildSidebar();
  applyBranding();
  document.getElementById("loginTitle").textContent = S.firma.name || "IB Raumkonzept GmbH";
  const loginBody = document.getElementById("loginBody");
  if(loginBody) loginBody.innerHTML = `<div class="empty" style="padding:10px 0;">Lädt…</div>`;
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js").catch(()=>{ /* offline-first still works without SW */ });
  }
  startLocalReminderLoop();
  await waitForSupabaseSDK();
  const sb = getSupabaseClient();
  if(sb){
    try{
      const { data } = await sb.auth.getSession();
      if(data && data.session){ await resolveAndEnter(data.session); return; }
    }catch(e){ /* fällt durch auf Login-Formular */ }
  }
  renderLogin();
}
document.addEventListener("DOMContentLoaded", boot);
